function BillingView({ ctx }) {
  const { clients, interventions, teams, pricing, savePricing, notify } = ctx;
  const [cycleKey, setCycleKey] = useState(() => billingCycleOf(new Date()).key);
  const [showPriceEditor, setShowPriceEditor] = useState(false);

  // All cycles present in data
  const cycles = useMemo(() => {
    const m = new Map();
    for (const i of interventions) {
      const c = billingCycleOf(new Date(i.startedAt));
      if (!m.has(c.key)) m.set(c.key, c);
    }
    // Ensure current cycle is always available
    const curr = billingCycleOf(new Date());
    if (!m.has(curr.key)) m.set(curr.key, curr);
    return Array.from(m.values()).sort((a, b) => b.start - a.start);
  }, [interventions]);

  const cycleData = useMemo(() => {
    const list = interventions.filter(i => billingCycleOf(new Date(i.startedAt)).key === cycleKey);
    // Bill only "Terminé" or "Installation OK"
    const billables = list.filter(i => i.status === "Terminé" || i.status === "Installation OK");
    const rows = billables.map(i => {
      const c = clients.find(x => x.id === i.clientId);
      const t = i.type || c?.type;
      // Use frozen amount if intervention was closed under that pricing.
      // Otherwise compute from current pricing at the time it was closed.
      let amount;
      if (typeof i.billedAmount === "number") {
        amount = i.billedAmount;
      } else {
        amount = priceFor(pricing, t, i.endedAt || i.startedAt);
      }
      return { intervention: i, client: c, type: t, amount };
    });
    const total = rows.reduce((sum, r) => sum + r.amount, 0);
    const byType = {};
    for (const r of rows) {
      const k = r.type || "—";
      byType[k] = (byType[k] || 0) + 1;
    }
    return { rows, total, byType, listCount: list.length };
  }, [cycleKey, interventions, clients, pricing]);

  const cycleObj = billingCycleOf(new Date(cycleKey + "-15"));
  const cycleEnd = new Date(cycleObj.start); cycleEnd.setMonth(cycleEnd.getMonth() + 1);

  const currPrices = currentPrices(pricing);
  const savePrices = async (newPrices) => {
    const newEntry = { at: new Date().toISOString(), prices: newPrices };
    const next = [...(pricing || []), newEntry];
    await savePricing(next);
    notify("Tarifs mis à jour. Applicable aux nouvelles interventions à partir de maintenant.", "success");
    setShowPriceEditor(false);
  };

  return (
    <div className="space-y-4">
      <div>
        <h1 className="text-2xl font-bold text-slate-900">Facturation</h1>
        <p className="text-sm text-slate-500">Cycle : du 11 au 11 du mois suivant</p>
      </div>

      {/* Pricing config card */}
      <div className="bg-white border border-slate-200 rounded-xl p-4">
        <div className="flex items-center justify-between mb-3">
          <h3 className="font-bold text-slate-900 flex items-center gap-2"><DollarSign className="w-5 h-5 text-emerald-600" /> Tarifs actuels</h3>
          <Btn size="sm" variant="primary" onClick={() => setShowPriceEditor(true)}>
            <Edit3 className="w-3.5 h-3.5" /> Modifier
          </Btn>
        </div>
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">
          {INTERVENTION_TYPES.map(t => (
            <div key={t} className="bg-slate-50 border border-slate-200 rounded-lg p-3">
              <div className="text-xs font-semibold text-slate-500 uppercase">{t}</div>
              <div className="text-xl font-bold text-slate-900 mt-1">{currPrices[t] ?? 0} <span className="text-xs font-medium text-slate-500">DH</span></div>
            </div>
          ))}
        </div>
        <p className="text-xs text-slate-500 mt-3">
          Les changements de tarifs ne s'appliquent qu'aux nouvelles interventions clôturées après modification. Les anciennes restent figées à leur prix d'origine.
        </p>
      </div>

      <div className="bg-white border border-slate-200 rounded-xl p-4">
        <Select label="Cycle de facturation" value={cycleKey} onChange={setCycleKey}
          options={cycles.length ? cycles.map(c => ({ value: c.key, label: c.label })) : [{ value: cycleKey, label: cycleObj.label }]}
        />
        <div className="text-xs text-slate-500 mt-2">
          Du <strong>{formatDate(cycleObj.start)}</strong> au <strong>{formatDate(cycleEnd)}</strong>
        </div>
      </div>

      <div className="grid grid-cols-2 sm:grid-cols-5 gap-3">
        <StatCard icon={CheckCircle2} label="Facturables" value={cycleData.rows.length} color="green" />
        {INTERVENTION_TYPES.map(t => (
          <StatCard key={t} icon={Users} label={t} value={cycleData.byType[t] || 0} color={t === "Nouveau" ? "blue" : t === "SAV" ? "amber" : t === "Partage" ? "rose" : "slate"} />
        ))}
      </div>

      <div className="bg-gradient-to-br from-emerald-500 to-blue-600 text-white rounded-xl p-5 sm:p-6">
        <DollarSign className="w-7 h-7 mb-2 opacity-90" />
        <div className="text-3xl sm:text-4xl font-bold">{cycleData.total.toLocaleString("fr-FR")} <span className="text-base font-medium">DH</span></div>
        <div className="text-xs font-semibold uppercase tracking-wide mt-1 opacity-90">Total de ce cycle</div>
      </div>

      <div className="bg-white border border-slate-200 rounded-xl overflow-hidden">
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="bg-slate-50 text-slate-600">
              <tr>
                <th className="text-left px-3 py-2 font-semibold">Date</th>
                <th className="text-left px-3 py-2 font-semibold">SIP</th>
                <th className="text-left px-3 py-2 font-semibold">Type</th>
                <th className="text-left px-3 py-2 font-semibold">Statut</th>
                <th className="text-left px-3 py-2 font-semibold">Équipe</th>
                <th className="text-right px-3 py-2 font-semibold">Montant</th>
              </tr>
            </thead>
            <tbody className="divide-y divide-slate-100">
              {cycleData.rows.map(r => {
                const team = teams.find(t => t.id === r.intervention.teamId);
                const typeColor = r.type === "Nouveau" ? "blue" : r.type === "SAV" ? "amber" : r.type === "Partage" ? "rose" : "slate";
                return (
                  <tr key={r.intervention.id}>
                    <td className="px-3 py-2 whitespace-nowrap">{formatDate(r.intervention.startedAt)}</td>
                    <td className="px-3 py-2 font-mono font-semibold">{r.client?.sip || "—"}</td>
                    <td className="px-3 py-2"><Badge color={typeColor}>{r.type || "—"}</Badge></td>
                    <td className="px-3 py-2">{r.intervention.status}</td>
                    <td className="px-3 py-2 text-slate-600">{team?.name || "—"}</td>
                    <td className="px-3 py-2 text-right font-semibold">{r.amount} DH</td>
                  </tr>
                );
              })}
              {cycleData.rows.length === 0 && (
                <tr><td colSpan={6} className="text-center py-8 text-slate-500">Aucune intervention facturable pour ce cycle</td></tr>
              )}
            </tbody>
            {cycleData.rows.length > 0 && (
              <tfoot className="bg-slate-50 font-bold">
                <tr>
                  <td colSpan={5} className="px-3 py-2 text-right">Total</td>
                  <td className="px-3 py-2 text-right">{cycleData.total.toLocaleString("fr-FR")} DH</td>
                </tr>
              </tfoot>
            )}
          </table>
        </div>
      </div>

      <Modal open={showPriceEditor} onClose={() => setShowPriceEditor(false)} title="Modifier les tarifs">
        <PriceEditor current={currPrices} onSave={savePrices} onCancel={() => setShowPriceEditor(false)} />
      </Modal>
    </div>
  );
}

function PriceEditor({ current, onSave, onCancel }) {
  const [prices, setPrices] = useState({
    Nouveau: String(current.Nouveau ?? 0),
    Existant: String(current.Existant ?? 0),
    SAV: String(current.SAV ?? 0),
    Partage: String(current.Partage ?? 0),
  });
  const [saving, setSaving] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    setSaving(true);
    const next = {
      Nouveau: Number(prices.Nouveau) || 0,
      Existant: Number(prices.Existant) || 0,
      SAV: Number(prices.SAV) || 0,
      Partage: Number(prices.Partage) || 0,
    };
    await onSave(next);
    setSaving(false);
  };

  return (
    <form onSubmit={submit} className="space-y-3">
      <div className="bg-amber-50 border border-amber-200 rounded-lg p-3 text-xs text-amber-800">
        ⚠️ Les anciennes interventions facturées resteront à leur tarif d'origine. Seules les nouvelles seront affectées.
      </div>
      {INTERVENTION_TYPES.map(t => (
        <Input key={t} label={`${t} (DH)`} type="number" value={prices[t]} inputMode="numeric"
          onChange={(v) => setPrices(p => ({ ...p, [t]: v }))} />
      ))}
      <div className="flex gap-2 pt-2">
        <Btn type="button" variant="secondary" onClick={onCancel} className="flex-1">Annuler</Btn>
        <Btn type="submit" variant="primary" className="flex-1" disabled={saving}>
          <Save className="w-4 h-4" /> {saving ? "Enregistrement…" : "Appliquer dès maintenant"}
        </Btn>
      </div>
    </form>
  );
}

function StockView({ ctx }) {
  const { session, teams, stock, saveStock, stockMovements, saveStockMovements, notify } = ctx;

  // Which teams should this user see and edit?
  const visibleTeams = useMemo(() => {
    if (session.role === "team") return teams.filter(t => t.id === session.teamId);
    return teams; // admin
  }, [session, teams]);

  const updateTeamStock = async (teamId, next, delta) => {
    const updated = setTeamStock(stock, teamId, next);
    await saveStock(updated);
    // Log IN movements when any field increased
    const inMovements = [];
    const now = new Date().toISOString();
    if (delta) {
      const items = {};
      if (delta.F6745 > 0) items.router_F6745 = delta.F6745;
      if (delta["Router 6600"] > 0) items.router_6600 = delta["Router 6600"];
      if (delta.cable_m > 0) items.cable_m = delta.cable_m;
      if (delta.fix_units > 0) items.fix_units = delta.fix_units;
      if (Object.keys(items).length > 0) {
        inMovements.push({
          id: uid(), at: now, teamId, type: "IN",
          items, userId: session.id,
        });
      }
      // Also log adjustments down (manual reduction not from intervention)
      const adjItems = {};
      if (delta.F6745 < 0) adjItems.router_F6745 = delta.F6745;
      if (delta["Router 6600"] < 0) adjItems.router_6600 = delta["Router 6600"];
      if (delta.cable_m < 0) adjItems.cable_m = delta.cable_m;
      if (delta.fix_units < 0) adjItems.fix_units = delta.fix_units;
      if (Object.keys(adjItems).length > 0) {
        inMovements.push({
          id: uid(), at: now, teamId, type: "ADJUST",
          items: adjItems, userId: session.id,
        });
      }
    }
    if (inMovements.length > 0) {
      await saveStockMovements([...stockMovements, ...inMovements]);
    }
    notify("Stock enregistré", "success");
  };

  return (
    <div className="space-y-4">
      <div>
        <h1 className="text-2xl font-bold text-slate-900">Stock</h1>
        <p className="text-sm text-slate-500">
          {session.role === "team"
            ? "Niveaux du stock de votre équipe. Déduction automatique lors des interventions."
            : "Niveaux par équipe. Déduction automatique lors des interventions."}
        </p>
      </div>

      {visibleTeams.length === 0 && (
        <div className="text-center py-12 text-slate-500">
          <Boxes className="w-10 h-10 mx-auto mb-2 opacity-30" />
          <p>Aucune équipe à afficher.</p>
        </div>
      )}

      {visibleTeams.map(t => (
        <TeamStockEditor
          key={t.id}
          team={t}
          value={teamStock(stock, t.id)}
          onSave={(next, delta) => updateTeamStock(t.id, next, delta)}
          canEdit={session.role === "admin" || (session.role === "team" && t.id === session.teamId)}
        />
      ))}

      {/* Movements history — admin only */}
      {session.role === "admin" && (
        <div className="bg-white border border-slate-200 rounded-xl p-5">
          <h3 className="font-bold text-slate-900 mb-3">Mouvements récents</h3>
          {stockMovements.length === 0 ? (
            <p className="text-sm text-slate-500">Aucun mouvement.</p>
          ) : (
            <ul className="divide-y divide-slate-100 text-sm">
              {stockMovements.slice().reverse().slice(0, 50).map(m => {
                const t = teams.find(x => x.id === m.teamId);
                const isOut = m.type === "OUT";
                const isAdjust = m.type === "ADJUST";
                const badgeColor = isOut ? "rose" : isAdjust ? "amber" : "green";
                const badgeLabel = isOut ? "SORTIE" : isAdjust ? "AJUST." : "ENTRÉE";
                // Render generic items (router_F6745, router_6600, cable_m, fix_units) OR legacy items (router, cable_m, fix)
                const parts = [];
                if (m.items.router) parts.push(`${m.items.router} ${isOut ? "−1" : "+1"}`); // legacy
                if (m.items.router_F6745) parts.push(`F6745 ${m.items.router_F6745 > 0 ? "+" : ""}${m.items.router_F6745}`);
                if (m.items.router_6600) parts.push(`Router 6600 ${m.items.router_6600 > 0 ? "+" : ""}${m.items.router_6600}`);
                if (m.items.cable_m && !m.items.router) parts.push(`câble ${m.items.cable_m > 0 ? "+" : ""}${m.items.cable_m}m`);
                else if (m.items.cable_m) parts.push(`câble −${m.items.cable_m}m`);
                if (m.items.fix_units) parts.push(`FIX ${m.items.fix_units > 0 ? "+" : ""}${m.items.fix_units}`);
                else if (m.items.fix) parts.push(`FIX −${m.items.fix}`);
                return (
                  <li key={m.id} className="py-2 flex items-center justify-between gap-2">
                    <span className="text-slate-700 text-xs sm:text-sm">
                      <span className="font-mono text-xs text-slate-500">{formatDateTime(m.at)}</span>
                      {t && <span className="text-slate-500"> · {t.name}</span>}
                      <span> · {parts.join(", ")}</span>
                    </span>
                    <Badge color={badgeColor}>{badgeLabel}</Badge>
                  </li>
                );
              })}
            </ul>
          )}
        </div>
      )}
    </div>
  );
}

function TeamStockEditor({ team, value, onSave, canEdit = true }) {
  // Initialize once per mount (using team.id as key forces remount when team changes)
  const [F6745, setF6745] = useState(String(value.F6745 ?? 0));
  const [r6600, setR6600] = useState(String(value["Router 6600"] ?? 0));
  const [cable, setCable] = useState(String(value.cable_m ?? 0));
  const [fixu, setFixu] = useState(String(value.fix_units ?? 0));
  const [dirty, setDirty] = useState(false);
  const [saving, setSaving] = useState(false);

  // Track which values are saved on the server so the editor doesn't snap back
  // mid-typing. We only re-sync from `value` after a successful save.
  const lastSavedRef = useRef({
    F6745: Number(value.F6745 ?? 0),
    "Router 6600": Number(value["Router 6600"] ?? 0),
    cable_m: Number(value.cable_m ?? 0),
    fix_units: Number(value.fix_units ?? 0),
  });

  const setField = (setter) => (v) => {
    setter(v);
    setDirty(true);
  };

  const save = async () => {
    setSaving(true);
    const next = {
      F6745: Number(F6745) || 0,
      "Router 6600": Number(r6600) || 0,
      cable_m: Number(cable) || 0,
      fix_units: Number(fixu) || 0,
    };
    const prev = lastSavedRef.current;
    // Compute deltas for IN movements (each field that went up)
    const delta = {
      F6745: next.F6745 - prev.F6745,
      "Router 6600": next["Router 6600"] - prev["Router 6600"],
      cable_m: next.cable_m - prev.cable_m,
      fix_units: next.fix_units - prev.fix_units,
    };
    await onSave(next, delta);
    lastSavedRef.current = next;
    setDirty(false);
    setSaving(false);
  };

  return (
    <div className="bg-white border border-slate-200 rounded-xl p-5">
      <div className="flex items-center justify-between mb-4">
        <h3 className="font-bold text-slate-900">{team.name}</h3>
        {dirty && <Badge color="amber">Non enregistré</Badge>}
      </div>
      <div className="grid sm:grid-cols-2 gap-4">
        <Input label="Routeur F6745 (unités)" type="number" value={F6745} onChange={setField(setF6745)} inputMode="numeric" />
        <Input label="Router 6600 (unités)" type="number" value={r6600} onChange={setField(setR6600)} inputMode="numeric" />
        <Input label="Câble intérieur (mètres)" type="number" value={cable} onChange={setField(setCable)} inputMode="numeric" />
        <Input label="FIX (unités)" type="number" value={fixu} onChange={setField(setFixu)} inputMode="numeric" />
      </div>
      {canEdit && (
        <div className="mt-5 sticky bottom-0 bg-white pt-2">
          <Btn variant="success" size="lg" onClick={save} disabled={!dirty || saving} className="w-full sm:w-auto">
            <Save className="w-5 h-5" /> {saving ? "Enregistrement…" : dirty ? "Enregistrer les modifications" : "Enregistré"}
          </Btn>
        </div>
      )}
    </div>
  );
}

function TeamsUsersView({ ctx }) {
  const { teams, users, clients, saveTeams, saveUsers, saveClients, notify, session } = ctx;
  const [tab, setTab] = useState("users");
  const [editing, setEditing] = useState(null); // user
  const [editTeam, setEditTeam] = useState(null); // team
  const [showUserForm, setShowUserForm] = useState(false);
  const [showTeamForm, setShowTeamForm] = useState(false);

  // ----- Users -----
  const saveUser = async (data) => {
    if (editing?.id) {
      let passwordHash = editing.passwordHash;
      if (data.password) passwordHash = await sha256(data.password);
      const next = users.map(u => u.id === editing.id ? { ...u, email: data.email, name: data.name, role: data.role, teamId: data.teamId || null, passwordHash } : u);
      await saveUsers(next);
      notify("Utilisateur modifié", "success");
    } else {
      if (users.some(u => u.email.toLowerCase() === data.email.toLowerCase())) return notify("Email déjà utilisé", "error");
      if (!data.password) return notify("Mot de passe requis", "error");
      const passwordHash = await sha256(data.password);
      const u = { id: uid(), email: data.email, name: data.name, role: data.role, teamId: data.teamId || null, passwordHash, createdAt: new Date().toISOString() };
      await saveUsers([...users, u]);
      notify("Utilisateur créé", "success");
    }
    setShowUserForm(false); setEditing(null);
  };
  const deleteUser = async (id) => {
    if (id === session.id) return notify("Impossible de supprimer son propre compte", "error");
    if (!confirm("Supprimer cet utilisateur ?")) return;
    await saveUsers(users.filter(u => u.id !== id));
    notify("Utilisateur supprimé", "success");
  };

  // ----- Teams -----
  const saveTeam = async (data) => {
    if (editTeam?.id) {
      await saveTeams(teams.map(t => t.id === editTeam.id ? { ...t, name: data.name } : t));
      notify("Équipe modifiée", "success");
    } else {
      await saveTeams([...teams, { id: uid(), name: data.name, createdAt: new Date().toISOString() }]);
      notify("Équipe créée", "success");
    }
    setShowTeamForm(false); setEditTeam(null);
  };
  const deleteTeam = async (id) => {
    if (!confirm("Supprimer cette équipe ? Les membres et clients seront détachés.")) return;
    await saveTeams(teams.filter(t => t.id !== id));
    await saveUsers(users.map(u => u.teamId === id ? { ...u, teamId: null } : u));
    await saveClients(clients.map(c => c.teamId === id ? { ...c, teamId: null } : c));
    notify("Équipe supprimée", "success");
  };

  return (
    <div className="space-y-4">
      <h1 className="text-2xl font-bold text-slate-900">Équipes & Utilisateurs</h1>
      <div className="flex gap-2">
        <button onClick={() => setTab("users")} className={`px-4 py-2 rounded-lg font-semibold text-sm ${tab === "users" ? "bg-blue-700 text-white" : "bg-white border border-slate-200"}`}>Utilisateurs ({users.length})</button>
        <button onClick={() => setTab("teams")} className={`px-4 py-2 rounded-lg font-semibold text-sm ${tab === "teams" ? "bg-blue-700 text-white" : "bg-white border border-slate-200"}`}>Équipes ({teams.length})</button>
      </div>

      {tab === "users" && (
        <>
          <div className="flex justify-end">
            <Btn variant="primary" onClick={() => { setEditing({}); setShowUserForm(true); }}><UserPlus className="w-4 h-4" /> Nouvel utilisateur</Btn>
          </div>
          <div className="space-y-2">
            {users.map(u => {
              const team = teams.find(t => t.id === u.teamId);
              const roleLabels = { admin: "Admin", team: "Équipe", observer: "Observateur" };
              return (
                <div key={u.id} className="bg-white border border-slate-200 rounded-xl p-4 flex items-start justify-between">
                  <div>
                    <div className="font-bold text-slate-900">{u.name}</div>
                    <div className="text-sm text-slate-500">{u.email}</div>
                    <div className="flex gap-2 mt-2">
                      <Badge color={u.role === "admin" ? "blue" : u.role === "team" ? "green" : "slate"}>{roleLabels[u.role]}</Badge>
                      {team && <Badge color="amber">{team.name}</Badge>}
                    </div>
                  </div>
                  <div className="flex gap-1.5">
                    <button onClick={() => { setEditing(u); setShowUserForm(true); }} className="p-2 rounded-lg hover:bg-slate-100"><Edit3 className="w-4 h-4 text-slate-600" /></button>
                    <button onClick={() => deleteUser(u.id)} className="p-2 rounded-lg hover:bg-rose-50"><Trash2 className="w-4 h-4 text-rose-600" /></button>
                  </div>
                </div>
              );
            })}
          </div>
        </>
      )}

      {tab === "teams" && (
        <>
          <div className="flex justify-end">
            <Btn variant="primary" onClick={() => { setEditTeam({}); setShowTeamForm(true); }}><Plus className="w-4 h-4" /> Nouvelle équipe</Btn>
          </div>
          <div className="space-y-2">
            {teams.map(t => {
              const members = users.filter(u => u.teamId === t.id);
              const tClients = clients.filter(c => c.teamId === t.id);
              return (
                <div key={t.id} className="bg-white border border-slate-200 rounded-xl p-4">
                  <div className="flex items-start justify-between">
                    <div>
                      <div className="font-bold text-slate-900">{t.name}</div>
                      <div className="text-xs text-slate-500 mt-1">{members.length} membre{members.length > 1 ? "s" : ""} · {tClients.length} client{tClients.length > 1 ? "s" : ""}</div>
                      {members.length > 0 && (
                        <div className="flex flex-wrap gap-1 mt-2">
                          {members.map(m => <Badge key={m.id} color="green">{m.name}</Badge>)}
                        </div>
                      )}
                    </div>
                    <div className="flex gap-1.5">
                      <button onClick={() => { setEditTeam(t); setShowTeamForm(true); }} className="p-2 rounded-lg hover:bg-slate-100"><Edit3 className="w-4 h-4 text-slate-600" /></button>
                      <button onClick={() => deleteTeam(t.id)} className="p-2 rounded-lg hover:bg-rose-50"><Trash2 className="w-4 h-4 text-rose-600" /></button>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </>
      )}

      <Modal open={showUserForm} onClose={() => { setShowUserForm(false); setEditing(null); }} title={editing?.id ? "Modifier l'utilisateur" : "Nouvel utilisateur"}>
        <UserForm user={editing} teams={teams} onSave={saveUser} onCancel={() => { setShowUserForm(false); setEditing(null); }} />
      </Modal>

      <Modal open={showTeamForm} onClose={() => { setShowTeamForm(false); setEditTeam(null); }} title={editTeam?.id ? "Modifier l'équipe" : "Nouvelle équipe"}>
        <TeamForm team={editTeam} onSave={saveTeam} onCancel={() => { setShowTeamForm(false); setEditTeam(null); }} />
      </Modal>
    </div>
  );
}

function ReportsView({ ctx }) {
  const { interventions, clients, teams, users } = ctx;
  const [month, setMonth] = useState("all");
  const [year, setYear] = useState(new Date().getFullYear());

  const years = useMemo(() => {
    const s = new Set();
    interventions.forEach(i => s.add(new Date(i.startedAt).getFullYear()));
    s.add(new Date().getFullYear());
    return Array.from(s).sort((a, b) => b - a);
  }, [interventions]);

  const filtered = useMemo(() => {
    return interventions.filter(i => {
      const d = new Date(i.startedAt);
      if (d.getFullYear() !== Number(year)) return false;
      if (month !== "all" && d.getMonth() !== Number(month)) return false;
      return true;
    });
  }, [interventions, month, year]);

  const stats = useMemo(() => {
    const byStatus = {};
    const byTeam = {};
    let totalDuration = 0; let countWithDuration = 0;
    let revenue = 0;
    for (const i of filtered) {
      byStatus[i.status] = (byStatus[i.status] || 0) + 1;
      const tn = (teams.find(t => t.id === i.teamId)?.name) || "—";
      byTeam[tn] = (byTeam[tn] || 0) + 1;
      if (i.endedAt) {
        totalDuration += new Date(i.endedAt) - new Date(i.startedAt);
        countWithDuration++;
      }
      if (i.status === "Terminé" || i.status === "Installation OK") {
        // Type lives on the intervention. Fall back to client.type for legacy data.
        const c = clients.find(x => x.id === i.clientId);
        const t = i.type || c?.type;
        revenue += t === "Nouveau" ? 300 : 150;
      }
    }
    return { byStatus, byTeam, avgDuration: countWithDuration ? totalDuration / countWithDuration : 0, revenue, total: filtered.length };
  }, [filtered, teams, clients]);

  return (
    <div className="space-y-4">
      <h1 className="text-2xl font-bold text-slate-900">Rapports & Statistiques</h1>

      <div className="bg-white border border-slate-200 rounded-xl p-3 flex flex-wrap gap-2">
        <select value={month} onChange={e => setMonth(e.target.value)} className="px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm">
          <option value="all">Toute l'année</option>
          {FRENCH_MONTHS.map((m, idx) => <option key={m} value={idx}>{m}</option>)}
        </select>
        <select value={year} onChange={e => setYear(e.target.value)} className="px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm">
          {years.map(y => <option key={y} value={y}>{y}</option>)}
        </select>
      </div>

      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
        <StatCard icon={FileText} label="Interventions" value={stats.total} color="blue" />
        <StatCard icon={Clock} label="Durée moy." value={formatDuration(stats.avgDuration)} color="amber" />
        <StatCard icon={CheckCircle2} label="Terminées" value={stats.byStatus["Terminé"] || 0} color="green" />
        <div className="bg-gradient-to-br from-emerald-500 to-blue-600 text-white rounded-xl p-3 sm:p-4">
          <DollarSign className="w-5 h-5 mb-2" />
          <div className="text-2xl sm:text-3xl font-bold">{stats.revenue.toLocaleString("fr-FR")} <span className="text-sm">DH</span></div>
          <div className="text-xs font-semibold uppercase mt-0.5 opacity-90">CA</div>
        </div>
      </div>

      <div className="grid sm:grid-cols-2 gap-3">
        <div className="bg-white border border-slate-200 rounded-xl p-4">
          <h3 className="font-bold text-slate-900 mb-3">Par statut</h3>
          <ul className="space-y-1.5">
            {STATUSES.map(s => {
              const n = stats.byStatus[s] || 0;
              const pct = stats.total ? Math.round((n / stats.total) * 100) : 0;
              return (
                <li key={s}>
                  <div className="flex justify-between text-sm mb-1">
                    <span className="text-slate-700">{s}</span>
                    <span className="font-semibold">{n} <span className="text-xs text-slate-400">({pct}%)</span></span>
                  </div>
                  <div className="h-2 bg-slate-100 rounded-full overflow-hidden">
                    <div className="h-full bg-gradient-to-r from-blue-500 to-emerald-500" style={{ width: `${pct}%` }} />
                  </div>
                </li>
              );
            })}
          </ul>
        </div>

        <div className="bg-white border border-slate-200 rounded-xl p-4">
          <h3 className="font-bold text-slate-900 mb-3">Par équipe</h3>
          <ul className="space-y-1.5">
            {Object.entries(stats.byTeam).map(([tn, n]) => {
              const pct = stats.total ? Math.round((n / stats.total) * 100) : 0;
              return (
                <li key={tn}>
                  <div className="flex justify-between text-sm mb-1">
                    <span className="text-slate-700">{tn}</span>
                    <span className="font-semibold">{n} <span className="text-xs text-slate-400">({pct}%)</span></span>
                  </div>
                  <div className="h-2 bg-slate-100 rounded-full overflow-hidden">
                    <div className="h-full bg-gradient-to-r from-emerald-500 to-blue-500" style={{ width: `${pct}%` }} />
                  </div>
                </li>
              );
            })}
            {Object.keys(stats.byTeam).length === 0 && <li className="text-sm text-slate-500">Aucune donnée</li>}
          </ul>
        </div>
      </div>
    </div>
  );
}

// CALENDAR — Rendez-vous par équipe
// ============================================================================
function CalendarView({ ctx }) {
  const { session, clients, teams, interventions } = ctx;
  const [monthOffset, setMonthOffset] = useState(0); // 0 = current month
  const [selectedTeamId, setSelectedTeamId] = useState(
    session.role === "team" ? session.teamId : "all"
  );
  const [selectedDay, setSelectedDay] = useState(null); // YYYY-MM-DD key

  // Pick the month being viewed
  const viewMonth = useMemo(() => {
    const d = new Date();
    d.setDate(1);
    d.setMonth(d.getMonth() + monthOffset);
    return d;
  }, [monthOffset]);

  const monthLabel = `${FRENCH_MONTHS[viewMonth.getMonth()]} ${viewMonth.getFullYear()}`;

  // Clients with a rendez-vous, in the user's scope
  const rdvClients = useMemo(() => {
    let list = clients.filter(c => c.rendezvousAt);
    if (session.role === "team") {
      list = list.filter(c => c.teamId === session.teamId);
    } else if (selectedTeamId !== "all") {
      list = list.filter(c => c.teamId === selectedTeamId);
    }
    return list;
  }, [clients, session, selectedTeamId]);

  // Group by date (YYYY-MM-DD) for the month grid
  const dayKey = (d) => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
  const eventsByDay = useMemo(() => {
    const map = new Map();
    for (const c of rdvClients) {
      const d = new Date(c.rendezvousAt);
      const k = dayKey(d);
      if (!map.has(k)) map.set(k, []);
      map.get(k).push(c);
    }
    // Sort each day's events by time
    for (const arr of map.values()) {
      arr.sort((a, b) => new Date(a.rendezvousAt) - new Date(b.rendezvousAt));
    }
    return map;
  }, [rdvClients]);

  // Build the month grid (6 weeks x 7 days, starting Monday)
  const monthGrid = useMemo(() => {
    const firstOfMonth = new Date(viewMonth.getFullYear(), viewMonth.getMonth(), 1);
    // Day of week: Mon=0..Sun=6
    const dow = (firstOfMonth.getDay() + 6) % 7;
    const gridStart = new Date(firstOfMonth);
    gridStart.setDate(firstOfMonth.getDate() - dow);
    const weeks = [];
    let cursor = new Date(gridStart);
    for (let w = 0; w < 6; w++) {
      const week = [];
      for (let d = 0; d < 7; d++) {
        week.push(new Date(cursor));
        cursor.setDate(cursor.getDate() + 1);
      }
      weeks.push(week);
    }
    return weeks;
  }, [viewMonth]);

  const today = new Date();
  const todayKey = dayKey(today);
  const isCurrentMonth = (d) => d.getMonth() === viewMonth.getMonth();

  // Upcoming events (next 14 days) for the side panel
  const upcoming = useMemo(() => {
    const now = new Date();
    return rdvClients
      .filter(c => new Date(c.rendezvousAt) >= now)
      .sort((a, b) => new Date(a.rendezvousAt) - new Date(b.rendezvousAt))
      .slice(0, 8);
  }, [rdvClients]);

  return (
    <div className="space-y-4 animate-[fadeIn_0.3s_ease]">
      <div className="flex items-start justify-between flex-wrap gap-3">
        <div>
          <h1 className="text-2xl font-bold text-slate-900 flex items-center gap-2">
            <Calendar className="w-6 h-6 text-blue-700" /> Agenda
          </h1>
          <p className="text-sm text-slate-500">
            {session.role === "team"
              ? "Rendez-vous de votre équipe"
              : selectedTeamId === "all" ? "Rendez-vous de toutes les équipes" : "Rendez-vous filtrés par équipe"}
          </p>
        </div>
        {(session.role === "admin" || session.role === "observer") && teams.length > 0 && (
          <select value={selectedTeamId} onChange={e => setSelectedTeamId(e.target.value)}
            className="px-3 py-2 bg-white border border-slate-300 rounded-lg text-sm">
            <option value="all">Toutes les équipes</option>
            {teams.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
          </select>
        )}
      </div>

      {/* Month navigation */}
      <div className="bg-white border border-slate-200 rounded-xl p-3 flex items-center justify-between">
        <Btn size="sm" variant="secondary" onClick={() => setMonthOffset(o => o - 1)}>‹ Précédent</Btn>
        <div className="text-base sm:text-lg font-bold text-slate-900 capitalize">{monthLabel}</div>
        <div className="flex gap-1.5">
          {monthOffset !== 0 && (
            <Btn size="sm" variant="ghost" onClick={() => setMonthOffset(0)}>Aujourd'hui</Btn>
          )}
          <Btn size="sm" variant="secondary" onClick={() => setMonthOffset(o => o + 1)}>Suivant ›</Btn>
        </div>
      </div>

      {/* Calendar grid */}
      <div className="bg-white border border-slate-200 rounded-xl overflow-hidden">
        <div className="grid grid-cols-7 bg-slate-50 border-b border-slate-200">
          {["Lun", "Mar", "Mer", "Jeu", "Ven", "Sam", "Dim"].map(d => (
            <div key={d} className="text-center text-xs font-bold text-slate-600 uppercase tracking-wide py-2">{d}</div>
          ))}
        </div>
        <div className="grid grid-cols-7">
          {monthGrid.flat().map((d, idx) => {
            const k = dayKey(d);
            const events = eventsByDay.get(k) || [];
            const isToday = k === todayKey;
            const isOutsideMonth = !isCurrentMonth(d);
            const isSelected = k === selectedDay;
            return (
              <button
                key={idx}
                onClick={() => setSelectedDay(events.length > 0 ? (isSelected ? null : k) : null)}
                disabled={events.length === 0}
                className={`min-h-[64px] sm:min-h-[88px] p-1 sm:p-2 border-r border-b border-slate-100 text-left transition
                  ${isOutsideMonth ? "bg-slate-50/50 text-slate-300" : "bg-white text-slate-900"}
                  ${events.length > 0 ? "hover:bg-blue-50 cursor-pointer" : ""}
                  ${isSelected ? "bg-blue-100 ring-2 ring-blue-500 ring-inset" : ""}
                `}>
                <div className={`text-xs font-semibold ${isToday ? "inline-flex items-center justify-center w-6 h-6 rounded-full bg-blue-600 text-white" : ""}`}>
                  {d.getDate()}
                </div>
                <div className="mt-1 space-y-0.5">
                  {events.slice(0, 2).map((c, i) => {
                    const team = teams.find(t => t.id === c.teamId);
                    const teamColor = team ? TEAM_COLOR_CLASSES[teamColorFor(team.id)] : "bg-slate-100 text-slate-700 border-slate-200";
                    return (
                      <div key={c.id} className={`text-[10px] sm:text-xs px-1.5 py-0.5 rounded border truncate font-medium ${teamColor}`}>
                        <span className="font-mono">{c.sip.slice(-5)}</span>
                        <span className="hidden sm:inline"> · {new Date(c.rendezvousAt).toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" })}</span>
                      </div>
                    );
                  })}
                  {events.length > 2 && (
                    <div className="text-[10px] text-slate-500 font-semibold pl-1">+{events.length - 2}</div>
                  )}
                </div>
              </button>
            );
          })}
        </div>
      </div>

      {/* Selected day detail */}
      {selectedDay && eventsByDay.get(selectedDay) && (
        <div className="bg-white border border-blue-200 rounded-xl p-4">
          <h3 className="font-bold text-slate-900 mb-3">
            {formatDate(new Date(selectedDay))}
          </h3>
          <div className="space-y-2">
            {eventsByDay.get(selectedDay).map(c => (
              <RdvCard key={c.id} client={c} teams={teams} />
            ))}
          </div>
        </div>
      )}

      {/* Upcoming list */}
      {upcoming.length > 0 && (
        <div className="bg-white border border-slate-200 rounded-xl p-4">
          <h3 className="font-bold text-slate-900 mb-3 flex items-center gap-2">
            <Clock className="w-5 h-5 text-emerald-600" /> Prochains rendez-vous
          </h3>
          <div className="space-y-2">
            {upcoming.map(c => <RdvCard key={c.id} client={c} teams={teams} />)}
          </div>
        </div>
      )}

      {rdvClients.length === 0 && (
        <div className="text-center py-12 text-slate-500 bg-white border border-slate-200 rounded-xl">
          <Calendar className="w-10 h-10 mx-auto mb-2 opacity-30" />
          <p>Aucun rendez-vous planifié.</p>
          <p className="text-xs mt-1">Ajoutez une date de rendez-vous lors de la création ou modification d'un client.</p>
        </div>
      )}
    </div>
  );
}

// Stable color per team based on team id (cycles through a small palette)
const TEAM_COLOR_CLASSES = {
  blue: "bg-blue-100 text-blue-800 border-blue-200",
  emerald: "bg-emerald-100 text-emerald-800 border-emerald-200",
  amber: "bg-amber-100 text-amber-800 border-amber-200",
  rose: "bg-rose-100 text-rose-800 border-rose-200",
  purple: "bg-purple-100 text-purple-800 border-purple-200",
  cyan: "bg-cyan-100 text-cyan-800 border-cyan-200",
};
function teamColorFor(teamId) {
  const palette = ["blue", "emerald", "amber", "rose", "purple", "cyan"];
  let hash = 0;
  for (let i = 0; i < (teamId || "").length; i++) hash = (hash * 31 + teamId.charCodeAt(i)) & 0xffffffff;
  return palette[Math.abs(hash) % palette.length];
}

function RdvCard({ client, teams }) {
  const team = teams.find(t => t.id === client.teamId);
  return (
    <div className="flex items-start justify-between gap-3 p-3 bg-slate-50 border border-slate-200 rounded-lg">
      <div className="flex-1 min-w-0">
        <div className="flex items-center gap-2 flex-wrap">
          <span className="font-mono font-bold text-slate-900">{client.sip}</span>
          {team && <Badge color="slate">{team.name}</Badge>}
        </div>
        {client.name && <div className="text-sm text-slate-700 mt-0.5">{client.name}</div>}
        {client.rendezvousNote && <div className="text-xs italic text-slate-500 mt-1">{client.rendezvousNote}</div>}
      </div>
      <div className="text-right text-sm font-semibold text-blue-700 whitespace-nowrap">
        {new Date(client.rendezvousAt).toLocaleString("fr-FR", { hour: "2-digit", minute: "2-digit" })}
      </div>
    </div>
  );
}

// ---- end ----


// Mount
const rootEl = document.getElementById('root');
rootEl.innerHTML = '';
const root = ReactDOM.createRoot(rootEl);
root.render(React.createElement(App));
</script>

// ---------- Utilities ----------
const STATUSES = ["Non commencé", "En cours", "Installation OK", "Bloqué", "Terminé"];
// Statuses a user can pick when closing an intervention.
// "En cours" is set automatically on start; "Non commencé" is the initial state.
const END_STATUSES = ["Installation OK", "Bloqué", "Terminé"];
const STATUS_COLORS = {
  "Non commencé": "bg-slate-100 text-slate-700 border-slate-300",
  "En cours": "bg-amber-100 text-amber-800 border-amber-300",
  "Installation OK": "bg-emerald-100 text-emerald-800 border-emerald-300",
  "Bloqué": "bg-rose-100 text-rose-800 border-rose-300",
  "Terminé": "bg-blue-100 text-blue-800 border-blue-300",
};
// Open = still needs work
const OPEN_STATUSES = new Set(["Non commencé", "En cours", "Installation OK"]);
const ROUTERS = ["F6745", "Router 6600"];
const FRENCH_MONTHS = [
  "Janvier","Février","Mars","Avril","Mai","Juin",
  "Juillet","Août","Septembre","Octobre","Novembre","Décembre"
];
const INTERVENTION_TYPES = ["Nouveau", "Existant", "SAV", "Partage"];
const DEFAULT_PRICES = { "Nouveau": 300, "Existant": 150, "SAV": 0, "Partage": 0 };

// Pricing has a date-stamped history: [{ at: ISO, prices: { Nouveau: 300, Existant: 150, SAV: 80, Partage: 60 } }]
// Sorted by date desc when reading. To find the price for an intervention closed at time T,
// pick the most recent entry with at <= T.
function priceFor(pricingHistory, type, atIso) {
  if (!type) return 0;
  const ref = atIso ? new Date(atIso).getTime() : Date.now();
  const sorted = [...(pricingHistory || [])].sort((a, b) => new Date(b.at) - new Date(a.at));
  for (const entry of sorted) {
    if (new Date(entry.at).getTime() <= ref) {
      return Number(entry.prices?.[type] ?? DEFAULT_PRICES[type] ?? 0);
    }
  }
  return Number(DEFAULT_PRICES[type] ?? 0);
}
function currentPrices(pricingHistory) {
  const sorted = [...(pricingHistory || [])].sort((a, b) => new Date(b.at) - new Date(a.at));
  if (sorted.length === 0) return { ...DEFAULT_PRICES };
  return { ...DEFAULT_PRICES, ...(sorted[0].prices || {}) };
}

async function sha256(text) {
  const buf = new TextEncoder().encode(text);
  const hash = await crypto.subtle.digest("SHA-256", buf);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, "0")).join("");
}

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);

// Ensure SIP always starts with leading 0
// Normalize a SIP: strip non-digits, ensure it starts with "05".
// - "5305..." → "05305..."  (just missing leading 0)
// - "0530..." → "0530..."   (already correct)
// - "530..."  → "0530..."   (legacy missing leading 0)
// - "06..."   → "06..."     (other prefixes left alone — only enforces leading 0)
function normalizeSip(raw) {
  const digits = String(raw || "").replace(/\D/g, "");
  if (!digits) return "";
  return digits.startsWith("0") ? digits : "0" + digits;
}

// Validate a SIP entered in a form. Must be all-digits and start with "05".
function isValidSip(raw) {
  const normalized = normalizeSip(raw);
  return /^05\d{6,}$/.test(normalized);
}

function formatDateTime(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  return d.toLocaleString("fr-FR", { day: "2-digit", month: "2-digit", year: "numeric", hour: "2-digit", minute: "2-digit" });
}
function formatDate(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  return d.toLocaleDateString("fr-FR", { day: "2-digit", month: "2-digit", year: "numeric" });
}
function formatDuration(ms) {
  if (!ms || ms < 0) return "—";
  const totalMin = Math.round(ms / 60000);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  if (h === 0) return `${m} min`;
  return `${h}h ${m.toString().padStart(2, "0")}min`;
}

// Billing cycle: 11th of month → 11th of next month. Returns label for the cycle a date falls in.
function billingCycleOf(date) {
  const d = new Date(date);
  const day = d.getDate();
  // If day < 11, this belongs to previous month's cycle (cycle starts on 11th of previous month)
  const cycleStart = new Date(d.getFullYear(), d.getMonth(), 11);
  if (day < 11) cycleStart.setMonth(cycleStart.getMonth() - 1);
  return {
    key: `${cycleStart.getFullYear()}-${(cycleStart.getMonth() + 1).toString().padStart(2, "0")}`,
    label: `${FRENCH_MONTHS[cycleStart.getMonth()]} ${cycleStart.getFullYear()}`,
    start: cycleStart,
  };
}

// ---------- Storage layer (localStorage) ----------
// In the standalone HTML build we don't have Claude's window.storage.
// We use the browser's localStorage instead. Data is per-device, not synced across devices.
const LS_PREFIX = "primelink_v4_";
async function sGet(key) {
  try {
    const raw = window.localStorage.getItem(LS_PREFIX + key);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}
async function sSet(key, value) {
  try {
    window.localStorage.setItem(LS_PREFIX + key, JSON.stringify(value));
    return true;
  } catch { return false; }
}

// ---------- Stock helpers (per-team model) ----------
const EMPTY_STOCK = { F6745: 0, "Router 6600": 0, cable_m: 0, fix_units: 0 };
function teamStock(stock, teamId) {
  if (!teamId) return EMPTY_STOCK;
  return stock[teamId] || EMPTY_STOCK;
}
function setTeamStock(stock, teamId, nextTeamStock) {
  return { ...stock, [teamId]: nextTeamStock };
}

// ---------- UI primitives ----------
function Btn({ children, onClick, variant = "primary", size = "md", disabled, className = "", type = "button", title }) {
  const base = "inline-flex items-center justify-center gap-2 font-medium rounded-lg transition active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed focus:outline-none focus:ring-2 focus:ring-offset-1";
  const sizes = { sm: "px-3 py-1.5 text-sm", md: "px-4 py-2 text-sm", lg: "px-5 py-3 text-base" };
  const variants = {
    primary: "bg-blue-700 text-white hover:bg-blue-800 focus:ring-blue-500 shadow-sm",
    secondary: "bg-white text-slate-800 border border-slate-300 hover:bg-slate-50 focus:ring-slate-300",
    success: "bg-emerald-600 text-white hover:bg-emerald-700 focus:ring-emerald-500 shadow-sm",
    danger: "bg-rose-600 text-white hover:bg-rose-700 focus:ring-rose-500 shadow-sm",
    warning: "bg-amber-500 text-white hover:bg-amber-600 focus:ring-amber-400 shadow-sm",
    ghost: "bg-transparent text-slate-700 hover:bg-slate-100",
  };
  return (
    <button type={type} onClick={onClick} disabled={disabled} title={title}
      className={`${base} ${sizes[size]} ${variants[variant]} ${className}`}>
      {children}
    </button>
  );
}

function Input({ label, value, onChange, type = "text", placeholder, required, autoFocus, className = "", inputMode }) {
  return (
    <label className={`block ${className}`}>
      {label && <span className="block text-xs font-semibold text-slate-600 mb-1 uppercase tracking-wide">{label}{required && " *"}</span>}
      <input
        type={type}
        value={value}
        onChange={(e) => onChange(e.target.value)}
        placeholder={placeholder}
        required={required}
        autoFocus={autoFocus}
        inputMode={inputMode}
        className="w-full px-3 py-2.5 bg-white border border-slate-300 rounded-lg text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
      />
    </label>
  );
}

function Select({ label, value, onChange, options, required, className = "" }) {
  return (
    <label className={`block ${className}`}>
      {label && <span className="block text-xs font-semibold text-slate-600 mb-1 uppercase tracking-wide">{label}{required && " *"}</span>}
      <select value={value} onChange={(e) => onChange(e.target.value)} required={required}
        className="w-full px-3 py-2.5 bg-white border border-slate-300 rounded-lg text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        {options.map(opt => (
          <option key={typeof opt === "string" ? opt : opt.value} value={typeof opt === "string" ? opt : opt.value}>
            {typeof opt === "string" ? opt : opt.label}
          </option>
        ))}
      </select>
    </label>
  );
}

function Modal({ open, onClose, title, children, size = "md" }) {
  if (!open) return null;
  const sizes = { sm: "max-w-md", md: "max-w-lg", lg: "max-w-2xl", xl: "max-w-4xl" };
  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-slate-900/60 backdrop-blur-sm p-0 sm:p-4" onClick={onClose}>
      <div className={`bg-white w-full ${sizes[size]} max-h-[92vh] overflow-y-auto rounded-t-2xl sm:rounded-2xl shadow-2xl`} onClick={(e) => e.stopPropagation()}>
        <div className="sticky top-0 bg-white border-b border-slate-200 px-5 py-4 flex items-center justify-between">
          <h2 className="text-lg font-bold text-slate-900">{title}</h2>
          <button onClick={onClose} className="p-1 rounded-lg hover:bg-slate-100 text-slate-500"><X className="w-5 h-5" /></button>
        </div>
        <div className="p-5">{children}</div>
      </div>
    </div>
  );
}

function Badge({ children, color = "slate" }) {
  const colors = {
    slate: "bg-slate-100 text-slate-700 border-slate-200",
    blue: "bg-blue-100 text-blue-700 border-blue-200",
    green: "bg-emerald-100 text-emerald-700 border-emerald-200",
    amber: "bg-amber-100 text-amber-700 border-amber-200",
    rose: "bg-rose-100 text-rose-700 border-rose-200",
  };
  return <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-md text-xs font-medium border ${colors[color]}`}>{children}</span>;
}

function Toast({ msg, type, onDone }) {
  useEffect(() => {
    if (!msg) return;
    const t = setTimeout(onDone, 3000);
    return () => clearTimeout(t);
  }, [msg, onDone]);
  if (!msg) return null;
  const colors = {
    success: "bg-emerald-600",
    error: "bg-rose-600",
    info: "bg-slate-800",
  };
  return (
    <div className="fixed top-4 left-1/2 -translate-x-1/2 z-[100] animate-[slideDown_0.3s_ease-out]">
      <div className={`${colors[type] || colors.info} text-white px-5 py-3 rounded-xl shadow-2xl flex items-center gap-2 max-w-sm`}>
        {type === "success" ? <CheckCircle2 className="w-5 h-5 flex-shrink-0" /> : type === "error" ? <AlertCircle className="w-5 h-5 flex-shrink-0" /> : <Clock className="w-5 h-5 flex-shrink-0" />}
        <span className="text-sm font-medium">{msg}</span>
      </div>
    </div>
  );
}

// ---------- Main App ----------
function App() {
  const [loaded, setLoaded] = useState(false);
  const [bootstrapping, setBootstrapping] = useState(false);
  const [users, setUsers] = useState([]);
  const [teams, setTeams] = useState([]);
  const [clients, setClients] = useState([]);
  const [interventions, setInterventions] = useState([]);
  const [stock, setStock] = useState({}); // { teamId: { F6745, "Router 6600", cable_m, fix_units } }
  const [stockMovements, setStockMovements] = useState([]);
  const [pricing, setPricing] = useState([]); // pricing history (newest first when sorted)
  const [session, setSession] = useState(null); // current logged-in user
  const [toast, setToast] = useState({ msg: "", type: "info" });
  const [view, setView] = useState("dashboard");

  const notify = (msg, type = "info") => setToast({ msg, type });

  // ----- Initial load + bootstrap -----
  useEffect(() => { (async () => {
    const initFlag = await sGet("init_v4");
    if (!initFlag) {
      // First-run bootstrap: create admin + Team 1 + seed clients
      setBootstrapping(true);
      const adminPwHash = await sha256("admin123");
      const adminUser = {
        id: uid(), email: "rchaali82@gmail.com", passwordHash: adminPwHash,
        name: "Admin", role: "admin", teamId: null, createdAt: new Date().toISOString(),
      };
      const team1 = { id: uid(), name: "Équipe 1", createdAt: new Date().toISOString() };
      // Create a default Team 1 member so seed interventions have an author
      const t1MemberHash = await sha256("equipe123");
      const t1Member = {
        id: uid(), email: "equipe1@primelink.local", passwordHash: t1MemberHash,
        name: "Équipe 1 — Membre", role: "team", teamId: team1.id, createdAt: new Date().toISOString(),
      };
      const observerHash = await sha256("observer123");
      const observer = {
        id: uid(), email: "observer@primelink.local", passwordHash: observerHash,
        name: "Observateur", role: "observer", teamId: null, createdAt: new Date().toISOString(),
      };

      const seedClients = [];
      const seedInterventions = [];
      for (const [date, sip, name, type, statut, comment] of SEED_CLIENTS_RAW) {
        const c = {
          id: uid(), sip, name: name || "",
          // Type now lives on the intervention, not the client.
          createdAt: new Date(date).toISOString(),
          createdByUserId: t1Member.id, teamId: team1.id,
          legacy: true, // marker: already done by Team 1
        };
        seedClients.push(c);
        const startedAt = new Date(date + "T09:00:00").toISOString();
        const endedAt = new Date(date + "T10:30:00").toISOString();
        seedInterventions.push({
          id: uid(), clientId: c.id, teamId: team1.id, userId: t1Member.id,
          startedAt, endedAt, status: statut, comment: comment || "",
          type, // Nouveau | Existant — set when intervention was completed
          stock: { router: "F6745", fix: "NON", cable_m: type === "Nouveau" ? 25 : 0 },
          stockDeducted: true,
          locked: statut === "Terminé",
          lockedAt: statut === "Terminé" ? endedAt : null,
          legacy: true,
          history: [{ at: startedAt, action: "Démarré (legacy import)" }, { at: endedAt, action: `Terminé en statut "${statut}"` }],
        });
      }

      await sSet("users", [adminUser, t1Member, observer]);
      await sSet("teams", [team1]);
      await sSet("clients", seedClients);
      await sSet("interventions", seedInterventions);
      const initialStock = { [team1.id]: { F6745: 50, "Router 6600": 20, cable_m: 1000, fix_units: 50 } };
      await sSet("stock", initialStock);
      await sSet("stockMovements", []);
      const initialPricing = [{ at: new Date(2020, 0, 1).toISOString(), prices: { ...DEFAULT_PRICES } }];
      await sSet("pricing", initialPricing);
      await sSet("init_v4", { at: new Date().toISOString() });

      setUsers([adminUser, t1Member, observer]);
      setTeams([team1]);
      setClients(seedClients);
      setInterventions(seedInterventions);
      setStock(initialStock);
      setStockMovements([]);
      setPricing(initialPricing);
      setBootstrapping(false);
    } else {
      const loadedUsers = (await sGet("users")) || [];
      let loadedClients = (await sGet("clients")) || [];
      const loadedInterventions = (await sGet("interventions")) || [];
      const loadedTeams = (await sGet("teams")) || [];
      // One-time SIP migration: ensure all SIPs start with "0" (e.g. legacy "5305..." → "05305...")
      const migratedClients = loadedClients.map(c => {
        const newSip = normalizeSip(c.sip);
        return newSip !== c.sip ? { ...c, sip: newSip } : c;
      });
      const needsClientMigration = migratedClients.some((c, idx) => c.sip !== loadedClients[idx].sip);
      if (needsClientMigration) {
        await sSet("clients", migratedClients);
      }
      // Stock migration: legacy flat { F6745, ... } → per-team { [teamId]: { F6745, ... } }
      let loadedStock = (await sGet("stock")) || {};
      const looksLikeFlat = loadedStock && ("F6745" in loadedStock || "Router 6600" in loadedStock || "cable_m" in loadedStock);
      if (looksLikeFlat && loadedTeams.length > 0) {
        loadedStock = { [loadedTeams[0].id]: {
          F6745: loadedStock.F6745 || 0,
          "Router 6600": loadedStock["Router 6600"] || 0,
          cable_m: loadedStock.cable_m || 0,
          fix_units: loadedStock.fix_units || 0,
        }};
        await sSet("stock", loadedStock);
      }
      // Pricing: ensure we have at least the default
      let loadedPricing = (await sGet("pricing")) || [];
      if (loadedPricing.length === 0) {
        loadedPricing = [{ at: new Date(2020, 0, 1).toISOString(), prices: { ...DEFAULT_PRICES } }];
        await sSet("pricing", loadedPricing);
      }
      setUsers(loadedUsers);
      setTeams(loadedTeams);
      setClients(migratedClients);
      setInterventions(loadedInterventions);
      setStock(loadedStock);
      setStockMovements((await sGet("stockMovements")) || []);
      setPricing(loadedPricing);
    }
    // Restore session from localStorage-style key in shared storage? No — session is per-device.
    // We use sessionStorage for the active login so logging out doesn't sign out other devices.
    try {
      const raw = sessionStorage.getItem("pl_session");
      if (raw) setSession(JSON.parse(raw));
    } catch {}
    setLoaded(true);
  })(); }, []);

  // Persist helpers
  const saveUsers = async (next) => { setUsers(next); await sSet("users", next); };
  const saveTeams = async (next) => { setTeams(next); await sSet("teams", next); };
  const saveClients = async (next) => { setClients(next); await sSet("clients", next); };
  const saveInterventions = async (next) => { setInterventions(next); await sSet("interventions", next); };
  const saveStock = async (next) => { setStock(next); await sSet("stock", next); };
  const saveStockMovements = async (next) => { setStockMovements(next); await sSet("stockMovements", next); };
  const savePricing = async (next) => { setPricing(next); await sSet("pricing", next); };

  const handleLogin = async (email, password) => {
    const hash = await sha256(password);
    const u = users.find(x => x.email.toLowerCase() === email.toLowerCase() && x.passwordHash === hash);
    if (!u) { notify("Email ou mot de passe incorrect", "error"); return false; }
    setSession(u);
    sessionStorage.setItem("pl_session", JSON.stringify(u));
    setView("dashboard");
    notify(`Bienvenue, ${u.name}`, "success");
    return true;
  };
  const handleLogout = () => {
    setSession(null);
    sessionStorage.removeItem("pl_session");
    setView("dashboard");
  };

  // Whenever users update, refresh the session reference
  useEffect(() => {
    if (session) {
      const u = users.find(x => x.id === session.id);
      if (u && JSON.stringify(u) !== JSON.stringify(session)) {
        setSession(u);
        sessionStorage.setItem("pl_session", JSON.stringify(u));
      }
    }
  }, [users]);

  if (!loaded || bootstrapping) {
    return (
      <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-50 via-blue-50 to-emerald-50">
        <div className="text-center">
          <img src={LOGO_ICON_DATAURL} alt="PrimeLink" className="w-20 h-20 mx-auto drop-shadow-md animate-pulse" />
          <p className="mt-4 text-slate-600 font-medium">{bootstrapping ? "Initialisation des données…" : "Chargement…"}</p>
        </div>
      </div>
    );
  }

  if (!session) {
    return <>
      <Login onLogin={handleLogin} />
      <Toast msg={toast.msg} type={toast.type} onDone={() => setToast({ msg: "", type: "info" })} />
    </>;
  }

  // ---------- Authenticated UI ----------
  const ctx = {
    session, users, teams, clients, interventions, stock, stockMovements, pricing,
    saveUsers, saveTeams, saveClients, saveInterventions, saveStock, saveStockMovements, savePricing,
    notify,
  };
  _inlineCtxRef = ctx; // keep the inline client-create form in sync with current state

  return (
    <div className="min-h-screen bg-slate-50 text-slate-900">
      <style>{`
        @keyframes slideDown { from { transform: translate(-50%, -20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
      `}</style>

      <TopBar session={session} onLogout={handleLogout} view={view} setView={setView} />

      <main className="max-w-7xl mx-auto px-3 sm:px-6 pb-24 pt-4 sm:pt-6">
        {view === "dashboard" && <Dashboard ctx={ctx} setView={setView} />}
        {view === "clients" && <ClientsView ctx={ctx} />}
        {view === "interventions" && <InterventionsView ctx={ctx} />}
        {view === "calendar" && <CalendarView ctx={ctx} />}
        {view === "stock" && (session.role === "admin" || session.role === "team") && <StockView ctx={ctx} />}
        {view === "billing" && session.role === "admin" && <BillingView ctx={ctx} />}
        {view === "teams" && session.role === "admin" && <TeamsUsersView ctx={ctx} />}
        {view === "reports" && session.role === "admin" && <ReportsView ctx={ctx} />}
      </main>

      <BottomNav session={session} view={view} setView={setView} />
      <Toast msg={toast.msg} type={toast.type} onDone={() => setToast({ msg: "", type: "info" })} />
    </div>
  );
}

function Login({ onLogin }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [showPw, setShowPw] = useState(false);
  const [submitting, setSubmitting] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    setSubmitting(true);
    await onLogin(email, password);
    setSubmitting(false);
  };

  return (
    <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-50 via-blue-50 to-emerald-50 p-4">
      <div className="w-full max-w-md">

        <form onSubmit={submit} className="bg-white rounded-2xl shadow-xl p-6 space-y-4 border border-slate-200">

            <span className="block text-xs font-semibold text-slate-600 mb-1 uppercase tracking-wide">Mot de passe *</span>

              <input
                type={showPw ? "text" : "password"}

                onChange={(e) => setPassword(e.target.value)}
                required
                className="w-full px-3 py-2.5 pr-11 bg-white border border-slate-300 rounded-lg text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-500"
              />
              <button type="button" onClick={() => setShowPw(s => !s)}

                {showPw ? <EyeOff className="w-4 h-4" /> : <Eye className="w-4 h-4" />}

          </div>
          <Btn type="submit" variant="primary" size="lg" className="w-full" disabled={submitting}>
            {submitting ? "Connexion…" : "Se connecter"}

        </form>

        <div className="mt-6 text-xs text-slate-500 bg-white/60 backdrop-blur border border-slate-200 rounded-xl p-4">
          <p className="font-semibold text-slate-700 mb-2">Comptes par défaut (à changer après la première connexion)</p>

            <div><span className="inline-block w-20 text-slate-500">Observer :</span> observer@primelink.local / observer123</div>
          </div>
        </div>
      </div>

function BottomNav({ session, view, setView }) {
  const tabs = [
    { id: "dashboard", label: "Accueil", icon: BarChart3 },
    { id: "clients", label: "Clients", icon: Users },
    { id: "interventions", label: "Visites", icon: Play },
    { id: "calendar", label: "Agenda", icon: Calendar },
  ];
  if (session.role === "team") {
    tabs.push({ id: "stock", label: "Stock", icon: Boxes });
  }
  if (session.role === "admin") {
    tabs.push({ id: "stock", label: "Stock", icon: Boxes });
  }
  return (
    <nav className="fixed bottom-0 left-0 right-0 z-30 bg-white/95 backdrop-blur border-t border-slate-200 sm:hidden">
      <div className={`grid h-16`} style={{ gridTemplateColumns: `repeat(${Math.min(tabs.length, 5)}, minmax(0, 1fr))` }}>
        {tabs.slice(0, 5).map(t => {
          const Icon = t.icon;
          const active = view === t.id;
          return (
            <button key={t.id} onClick={() => setView(t.id)}
              className={`flex flex-col items-center justify-center gap-0.5 ${active ? "text-blue-700" : "text-slate-500"}`}>
              <Icon className="w-5 h-5" strokeWidth={active ? 2.5 : 2} />
              <span className={`text-[10px] ${active ? "font-bold" : "font-medium"}`}>{t.label}</span>
            </button>
          );
        })}
      </div>
    </nav>
  );
}

function Dashboard({ ctx, setView }) {
  const { session, clients, interventions, teams, stock } = ctx;
  const myTeam = teams.find(t => t.id === session.teamId);

  const stats = useMemo(() => {
    const visibleI = session.role === "team"
      ? interventions.filter(i => i.teamId === session.teamId)
      : interventions;
    const visibleClients = session.role === "team"
      ? clients.filter(c => c.teamId === session.teamId)
      : clients;
    const thisCycle = billingCycleOf(new Date()).key;
    return {
      total: visibleI.length,
      completed: visibleI.filter(i => i.status === "Terminé").length,
      inProgress: visibleI.filter(i => i.status === "En cours" || !i.endedAt).length,
      blocked: visibleI.filter(i => i.status === "Bloqué").length,
      thisCycleCount: visibleI.filter(i => billingCycleOf(new Date(i.startedAt)).key === thisCycle).length,
      clientsTotal: visibleClients.length,
    };
  }, [session, clients, interventions]);

  return (
    <div className="space-y-5 animate-[fadeIn_0.3s_ease]">
      <div className="bg-gradient-to-br from-blue-600 to-emerald-500 rounded-2xl p-5 sm:p-6 text-white shadow-lg">
        <div className="text-xs uppercase tracking-widest opacity-80 font-semibold">Bienvenue</div>
        <div className="text-2xl sm:text-3xl font-bold mt-1">{session.name}</div>
        <div className="text-sm opacity-90 mt-1">
          {session.role === "admin" && "Tableau de bord administrateur"}
          {session.role === "team" && (myTeam ? myTeam.name : "Équipe")}
          {session.role === "observer" && "Mode observateur — lecture seule"}
        </div>
      </div>

      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
        <StatCard icon={Users} label="Clients" value={stats.clientsTotal} color="blue" />
        <StatCard icon={CheckCircle2} label="Terminées" value={stats.completed} color="green" />
        <StatCard icon={Clock} label="En cours" value={stats.inProgress} color="amber" />
        <StatCard icon={AlertCircle} label="Bloquées" value={stats.blocked} color="rose" />
      </div>

      <div className="grid sm:grid-cols-2 gap-3">
        <ActionCard title="Gérer les clients" desc="Ajouter, rechercher, trier les clients par SIP" icon={Users} onClick={() => setView("clients")} />
        <ActionCard title="Interventions" desc="Démarrer, suivre, et clôturer les visites" icon={Play} onClick={() => setView("interventions")} />
        <ActionCard title="Agenda" desc="Rendez-vous planifiés par équipe" icon={Calendar} onClick={() => setView("calendar")} />
        {(session.role === "admin" || session.role === "team") && (
          <ActionCard title="Stock" desc={session.role === "team" ? "Mettre à jour le stock de mon équipe" : "Stock par équipe — Routeurs, câbles et FIX"} icon={Boxes} onClick={() => setView("stock")} />
        )}
        {session.role === "admin" && <>
          <ActionCard title="Facturation" desc="Cycle mensuel du 11 au 11 — tarifs auto" icon={DollarSign} onClick={() => setView("billing")} />
          <ActionCard title="Équipes & utilisateurs" desc="Créer et gérer les comptes" icon={UserCog} onClick={() => setView("teams")} />
          <ActionCard title="Rapports" desc="Statistiques mensuelles et historique" icon={BarChart3} onClick={() => setView("reports")} />
        </>}
      </div>

      {/* Stock summary on dashboard */}
      {session.role === "admin" && teams.length > 0 && (
        <div className="bg-white rounded-2xl border border-slate-200 p-5">
          <h3 className="font-bold text-slate-900 mb-3 flex items-center gap-2"><Boxes className="w-5 h-5 text-emerald-600" /> Stock par équipe</h3>
          <div className="space-y-4">
            {teams.map(t => {
              const ts = teamStock(stock, t.id);
              return (
                <div key={t.id}>
                  <div className="text-sm font-semibold text-slate-700 mb-2">{t.name}</div>
                  <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
                    <StockBox label="Routeur F6745" value={ts.F6745} unit="u." />
                    <StockBox label="Router 6600" value={ts["Router 6600"]} unit="u." />
                    <StockBox label="Câble intérieur" value={ts.cable_m} unit="m" />
                    <StockBox label="FIX" value={ts.fix_units} unit="u." />
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
      {session.role === "team" && myTeam && (() => {
        const ts = teamStock(stock, myTeam.id);
        return (
          <div className="bg-white rounded-2xl border border-slate-200 p-5">
            <h3 className="font-bold text-slate-900 mb-3 flex items-center gap-2"><Boxes className="w-5 h-5 text-emerald-600" /> Mon stock — {myTeam.name}</h3>
            <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
              <StockBox label="Routeur F6745" value={ts.F6745} unit="u." />
              <StockBox label="Router 6600" value={ts["Router 6600"]} unit="u." />
              <StockBox label="Câble intérieur" value={ts.cable_m} unit="m" />
              <StockBox label="FIX" value={ts.fix_units} unit="u." />
            </div>
          </div>
        );
      })()}
    </div>
  );
}

function StatCard({ icon: Icon, label, value, color }) {
  const colors = {
    blue: "from-blue-50 to-blue-100 text-blue-700 border-blue-200",
    green: "from-emerald-50 to-emerald-100 text-emerald-700 border-emerald-200",
    amber: "from-amber-50 to-amber-100 text-amber-700 border-amber-200",
    rose: "from-rose-50 to-rose-100 text-rose-700 border-rose-200",
    slate: "from-slate-50 to-slate-100 text-slate-700 border-slate-200",
  };
  return (
    <div className={`bg-gradient-to-br ${colors[color] || colors.slate} border rounded-xl p-3 sm:p-4`}>
      <Icon className="w-5 h-5 mb-2" />
      <div className="text-2xl sm:text-3xl font-bold">{value}</div>
      <div className="text-xs font-semibold uppercase tracking-wide mt-0.5">{label}</div>
    </div>
  );
}

function ActionCard({ title, desc, icon: Icon, onClick }) {
  return (
    <button onClick={onClick} className="text-left bg-white border border-slate-200 rounded-2xl p-4 hover:shadow-md hover:border-blue-300 transition group">
      <div className="flex items-start gap-3">
        <div className="w-10 h-10 rounded-xl bg-blue-50 group-hover:bg-blue-100 flex items-center justify-center transition">
          <Icon className="w-5 h-5 text-blue-700" />
        </div>
        <div className="flex-1">
          <div className="font-bold text-slate-900">{title}</div>
          <div className="text-xs text-slate-500 mt-0.5">{desc}</div>
        </div>
        <ChevronRight className="w-5 h-5 text-slate-400 group-hover:text-blue-600 mt-1" />
      </div>
    </button>
  );
}

function StockBox({ label, value, unit }) {
  const low = value < 5;
  return (
    <div className={`rounded-xl p-3 border ${low ? "bg-rose-50 border-rose-200" : "bg-slate-50 border-slate-200"}`}>
      <div className={`text-xs uppercase font-semibold tracking-wide ${low ? "text-rose-700" : "text-slate-500"}`}>{label}</div>
      <div className="flex items-baseline gap-1 mt-1">
        <span className={`text-2xl font-bold ${low ? "text-rose-700" : "text-slate-900"}`}>{value}</span>
        <span className="text-xs text-slate-500 font-medium">{unit}</span>
      </div>
    </div>
  );
}

function ClientsView({ ctx }) {
  const { session, clients, interventions, users, teams, saveClients, notify } = ctx;
  const [search, setSearch] = useState("");
  const [sort, setSort] = useState("date_desc"); // date_asc, date_desc, alpha
  const [editing, setEditing] = useState(null); // client or {}
  const [showForm, setShowForm] = useState(false);

  const filtered = useMemo(() => {
    let list = clients;
    // Team isolation: team users only see their own team's clients
    if (session.role === "team") list = list.filter(c => c.teamId === session.teamId);
    if (search.trim()) {
      const term = normalizeSip(search.trim());
      list = list.filter(c => c.sip.includes(term) || c.sip.includes(search.trim()));
    }
    list = [...list];
    if (sort === "date_desc") list.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
    if (sort === "date_asc") list.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
    if (sort === "alpha") list.sort((a, b) => (a.name || a.sip).localeCompare(b.name || b.sip));
    return list;
  }, [clients, search, sort, session]);

  // Derive the most-recent intervention type per client (for the type badge)
  const lastTypeByClient = useMemo(() => {
    const map = new Map();
    const sorted = [...interventions].sort((a, b) => new Date(b.startedAt) - new Date(a.startedAt));
    for (const i of sorted) {
      if (i.type && !map.has(i.clientId)) map.set(i.clientId, i.type);
    }
    // Fallback to legacy client.type if intervention has none
    for (const c of clients) {
      if (!map.has(c.id) && c.type) map.set(c.id, c.type);
    }
    return map;
  }, [interventions, clients]);

  // Clients whose work is complete (have a Terminé intervention) — these are locked from editing
  const completedClientIds = useMemo(() => {
    const set = new Set();
    for (const i of interventions) {
      if (i.status === "Terminé") set.add(i.clientId);
    }
    return set;
  }, [interventions]);

  const canEdit = session.role === "admin" || session.role === "team";
  const canAssignTeam = session.role === "admin";

  const saveClient = async (data) => {
    let next;
    if (editing && editing.id) {
      // Refuse modification if the client has a completed intervention and user is not admin
      if (completedClientIds.has(editing.id) && session.role !== "admin") {
        notify("Ce client est terminé et ne peut plus être modifié.", "error");
        return;
      }
      next = clients.map(c => c.id === editing.id ? { ...c, ...data } : c);
      notify("Client modifié", "success");
    } else {
      if (clients.some(c => c.sip === data.sip)) {
        notify("Un client avec ce SIP existe déjà", "error");
        return;
      }
      const newClient = {
        id: uid(),
        sip: data.sip,
        name: data.name || "",
        type: null, // set when first intervention is completed
        createdAt: new Date().toISOString(),
        createdByUserId: session.id,
        teamId: data.teamId || session.teamId || null,
        rendezvousAt: data.rendezvousAt || null,
        rendezvousNote: data.rendezvousNote || "",
        blocked: false,
        blockReason: "",
        legacy: false,
      };
      next = [newClient, ...clients];
      notify("Client ajouté", "success");
    }
    await saveClients(next);
    setShowForm(false); setEditing(null);
  };

  const deleteClient = async (id) => {
    if (!confirm("Supprimer ce client ? Les interventions associées resteront mais sans client lié.")) return;
    await saveClients(clients.filter(c => c.id !== id));
    notify("Client supprimé", "success");
  };

  const [blockTarget, setBlockTarget] = useState(null); // client to block/unblock
  const submitBlock = async (reason) => {
    if (!blockTarget) return;
    const willBlock = !blockTarget.blocked;
    if (willBlock && !reason.trim()) {
      notify("Un motif est requis pour bloquer un client.", "error");
      return;
    }
    const next = clients.map(c => c.id === blockTarget.id
      ? { ...c, blocked: willBlock, blockReason: willBlock ? reason.trim() : "" }
      : c);
    await saveClients(next);
    notify(willBlock ? "Client bloqué" : "Client débloqué", "success");
    setBlockTarget(null);
  };

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between">
        <div>
          <h1 className="text-2xl font-bold text-slate-900">Clients</h1>
          <p className="text-sm text-slate-500">{filtered.length} résultat{filtered.length > 1 ? "s" : ""}</p>
        </div>
        {canEdit && (
          <Btn onClick={() => { setEditing({}); setShowForm(true); }} variant="primary">
            <Plus className="w-4 h-4" /> Nouveau
          </Btn>
        )}
      </div>

      <div className="bg-white rounded-xl border border-slate-200 p-3 flex flex-col sm:flex-row gap-2">
        <div className="relative flex-1">
          <Search className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" />
          <input
            value={search}
            onChange={e => setSearch(e.target.value)}
            placeholder="Rechercher par SIP…"
            inputMode="numeric"
            className="w-full pl-9 pr-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>
        <select value={sort} onChange={e => setSort(e.target.value)}
          className="px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
          <option value="date_desc">Date ↓ (récent)</option>
          <option value="date_asc">Date ↑ (ancien)</option>
          <option value="alpha">Alphabétique</option>
        </select>
      </div>

      <div className="space-y-2">
        {filtered.map(c => {
          const creator = users.find(u => u.id === c.createdByUserId);
          const team = teams.find(t => t.id === c.teamId);
          const lastType = lastTypeByClient.get(c.id);
          const isCompleted = completedClientIds.has(c.id);
          // Admins can still edit completed clients; teams cannot
          const canEditThis = canEdit && (session.role === "admin" || !isCompleted);
          const typeColor = lastType === "Nouveau" ? "blue" : lastType === "SAV" ? "amber" : lastType === "Partage" ? "rose" : "slate";
          return (
            <div key={c.id} className={`bg-white border rounded-xl p-4 hover:shadow-sm ${c.blocked ? "border-rose-300 bg-rose-50/30" : isCompleted ? "border-slate-200 opacity-90" : "border-slate-200"}`}>
              <div className="flex items-start justify-between gap-3">
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 flex-wrap">
                    <span className="text-xl sm:text-2xl font-bold tracking-tight text-slate-900 font-mono">{c.sip}</span>
                    {lastType && <Badge color={typeColor}>{lastType}</Badge>}
                    {isCompleted && <Badge color="blue"><Lock className="w-3 h-3" /> Terminé</Badge>}
                    {c.blocked && <Badge color="rose"><AlertCircle className="w-3 h-3" /> Bloqué</Badge>}
                    {c.legacy && <Badge color="green">Déjà fait — Équipe 1</Badge>}
                    {c.rendezvousAt && <Badge color="amber"><Calendar className="w-3 h-3" /> RDV {formatDateTime(c.rendezvousAt)}</Badge>}
                  </div>
                  {c.name && <div className="text-sm text-slate-600 mt-0.5">{c.name}</div>}
                  {c.blocked && c.blockReason && (
                    <div className="text-xs italic text-rose-700 mt-1.5 bg-rose-100 border border-rose-200 rounded-md px-2 py-1 inline-block">
                      Motif : {c.blockReason}
                    </div>
                  )}
                  {c.rendezvousAt && c.rendezvousNote && (
                    <div className="text-xs italic text-slate-500 mt-1">RDV : {c.rendezvousNote}</div>
                  )}
                  <div className="text-xs text-slate-400 mt-2 flex flex-wrap gap-x-3 gap-y-0.5">
                    <span>Créé le {formatDate(c.createdAt)}</span>
                    {creator && <span>par {creator.name}</span>}
                    {team && <span>· {team.name}</span>}
                  </div>
                </div>
                {canEditThis && (
                  <div className="flex flex-col gap-1.5">
                    <button onClick={() => { setEditing(c); setShowForm(true); }} className="p-2 rounded-lg hover:bg-slate-100 text-slate-600" title="Modifier">
                      <Edit3 className="w-4 h-4" />
                    </button>
                    <button onClick={() => setBlockTarget(c)}
                      className={`p-2 rounded-lg ${c.blocked ? "hover:bg-emerald-50 text-emerald-700" : "hover:bg-rose-50 text-rose-600"}`}
                      title={c.blocked ? "Débloquer" : "Bloquer"}>
                      {c.blocked ? <Unlock className="w-4 h-4" /> : <Lock className="w-4 h-4" />}
                    </button>
                    {session.role === "admin" && (
                      <button onClick={() => deleteClient(c.id)} className="p-2 rounded-lg hover:bg-rose-50 text-rose-600" title="Supprimer">
                        <Trash2 className="w-4 h-4" />
                      </button>
                    )}
                  </div>
                )}
              </div>
            </div>
          );
        })}
        {filtered.length === 0 && (
          <div className="text-center py-12 text-slate-500">
            <Users className="w-10 h-10 mx-auto mb-2 opacity-30" />
            <p>Aucun client trouvé</p>
          </div>
        )}
      </div>

      <Modal open={showForm} onClose={() => { setShowForm(false); setEditing(null); }} title={editing?.id ? "Modifier le client" : "Nouveau client"}>
        <ClientForm
          client={editing}
          teams={teams}
          canAssignTeam={canAssignTeam}
          defaultTeamId={session.teamId}
          onSave={saveClient}
          onCancel={() => { setShowForm(false); setEditing(null); }}
        />
      </Modal>

      <Modal open={!!blockTarget} onClose={() => setBlockTarget(null)} title={blockTarget?.blocked ? "Débloquer le client" : "Bloquer le client"} size="md">
        {blockTarget && (
          <BlockClientForm client={blockTarget} onConfirm={submitBlock} onCancel={() => setBlockTarget(null)} />
        )}
      </Modal>
    </div>
  );
}

function BlockClientForm({ client, onConfirm, onCancel }) {
  const [reason, setReason] = useState("");
  const willBlock = !client.blocked;
  return (
    <form onSubmit={(e) => { e.preventDefault(); onConfirm(reason); }} className="space-y-4">
      <div className="bg-slate-50 border border-slate-200 rounded-lg p-3">
        <div className="font-mono font-bold text-lg text-slate-900">{client.sip}</div>
        {client.name && <div className="text-sm text-slate-600">{client.name}</div>}
      </div>
      {willBlock ? (
        <>
          <div className="bg-rose-50 border border-rose-200 rounded-lg p-3 text-xs text-rose-800">
            Bloquer ce client le signale comme indisponible. Vous pouvez le débloquer à tout moment.
          </div>
          <div>
            <span className="block text-xs font-semibold text-slate-600 mb-1 uppercase tracking-wide">Motif du blocage *</span>
            <textarea value={reason} onChange={e => setReason(e.target.value)} rows={3} required autoFocus
              placeholder="Ex. : Manque de CIN, adresse introuvable, client injoignable…"
              className="w-full px-3 py-2 bg-white border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-rose-500" />
          </div>
        </>
      ) : (
        <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-3 text-xs text-emerald-800">
          Ce client est actuellement bloqué pour le motif : <strong>{client.blockReason || "—"}</strong>. Le débloquer le rendra à nouveau utilisable.
        </div>
      )}
      <div className="flex gap-2 pt-2">
        <Btn type="button" variant="secondary" onClick={onCancel} className="flex-1">Annuler</Btn>
        <Btn type="submit" variant={willBlock ? "danger" : "success"} className="flex-1">
          {willBlock ? <><Lock className="w-4 h-4" /> Bloquer</> : <><Unlock className="w-4 h-4" /> Débloquer</>}
        </Btn>
      </div>
    </form>
  );
}

function ClientForm({ client, teams, canAssignTeam, defaultTeamId, onSave, onCancel }) {
  const [sip, setSip] = useState(client?.sip || "");
  const [name, setName] = useState(client?.name || "");
  const [teamId, setTeamId] = useState(client?.teamId || defaultTeamId || (teams[0]?.id ?? ""));
  // Rendez-vous: split into date (YYYY-MM-DD) and time (HH:MM) for friendlier inputs
  const initialRdv = client?.rendezvousAt ? new Date(client.rendezvousAt) : null;
  const pad = (n) => String(n).padStart(2, "0");
  const [rdvDate, setRdvDate] = useState(initialRdv ? `${initialRdv.getFullYear()}-${pad(initialRdv.getMonth() + 1)}-${pad(initialRdv.getDate())}` : "");
  const [rdvTime, setRdvTime] = useState(initialRdv ? `${pad(initialRdv.getHours())}:${pad(initialRdv.getMinutes())}` : "");
  const [rdvNote, setRdvNote] = useState(client?.rendezvousNote || "");

  const submit = (e) => {
    e.preventDefault();
    if (!isValidSip(sip)) { alert("SIP invalide. Il doit commencer par 05 et contenir uniquement des chiffres."); return; }
    const normalized = normalizeSip(sip);
    let rendezvousAt = null;
    if (rdvDate) {
      const time = rdvTime || "09:00";
      // Build a local-time ISO string
      const d = new Date(`${rdvDate}T${time}:00`);
      if (!isNaN(d.getTime())) rendezvousAt = d.toISOString();
    }
    onSave({ sip: normalized, name: name.trim(), teamId, rendezvousAt, rendezvousNote: rdvNote.trim() });
  };

  return (
    <form onSubmit={submit} className="space-y-4">
      <Input label="SIP (numérique)" value={sip} onChange={setSip} placeholder="0530000000" inputMode="numeric" required autoFocus />
      <p className="text-xs text-slate-500 -mt-2">Le type (Nouveau / Existant / SAV / Partage) sera choisi à la fin de l'intervention.</p>
      <Input label="Nom du client (optionnel)" value={name} onChange={setName} placeholder="Prénom NOM" />
      {canAssignTeam && teams.length > 0 && (
        <Select label="Équipe assignée" value={teamId} onChange={setTeamId}
          options={teams.map(t => ({ value: t.id, label: t.name }))} />
      )}

      <div className="bg-blue-50 border border-blue-200 rounded-xl p-3 space-y-3">
        <div className="flex items-center gap-2 text-blue-900 font-semibold text-sm">
          <Calendar className="w-4 h-4" /> Rendez-vous (optionnel)
        </div>
        <div className="grid grid-cols-2 gap-2">
          <Input label="Date" type="date" value={rdvDate} onChange={setRdvDate} />
          <Input label="Heure" type="time" value={rdvTime} onChange={setRdvTime} />
        </div>
        <Input label="Note (optionnelle)" value={rdvNote} onChange={setRdvNote} placeholder="Adresse, contact, info utile…" />
        {rdvDate && (
          <button type="button" onClick={() => { setRdvDate(""); setRdvTime(""); setRdvNote(""); }}
            className="text-xs text-rose-700 font-semibold hover:underline">Effacer le rendez-vous</button>
        )}
      </div>

      <div className="flex gap-2 pt-2">
        <Btn type="button" variant="secondary" onClick={onCancel} className="flex-1">Annuler</Btn>
        <Btn type="submit" variant="primary" className="flex-1"><Save className="w-4 h-4" /> Enregistrer</Btn>
      </div>
    </form>
  );
}

// ============================================================================
// INTERVENTIONS
// ============================================================================
function InterventionsView({ ctx }) {
  const { session, clients, interventions, users, teams, pricing, saveInterventions, stock, saveStock, stockMovements, saveStockMovements, notify } = ctx;

  const [search, setSearch] = useState("");
  // Default: team users see open work first (Non commencé / En cours / Installation OK / Bloqué = non-completed).
  // Admin / observer see everything.
  const [statusFilter, setStatusFilter] = useState(session.role === "team" ? "active" : "all");
  const [monthFilter, setMonthFilter] = useState("all");
  const [sort, setSort] = useState("date_desc");
  const [showStart, setShowStart] = useState(false);
  const [active, setActive] = useState(null); // intervention to end / view
  const [viewing, setViewing] = useState(null);

  // Build a combined list:
  //  - Real interventions (team users see only their team)
  //  - Virtual "Non commencé" rows for clients in scope that have no intervention yet
  // Real interventions come pre-sorted to the top; sort applies within groups.
  const visibleInterventions = useMemo(() => {
    // Real interventions filtered to user scope
    let realList = interventions;
    if (session.role === "team") realList = realList.filter(i => i.teamId === session.teamId);

    // Find which clients already have ANY intervention
    const clientsWithIntervention = new Set(realList.map(i => i.clientId));

    // Clients in scope without any intervention → virtual "Non commencé" rows.
    // Exclude blocked clients (they're not "à faire" until unblocked).
    let scopeClients = clients;
    if (session.role === "team") scopeClients = scopeClients.filter(c => c.teamId === session.teamId);
    const virtualRows = scopeClients
      .filter(c => !clientsWithIntervention.has(c.id) && !c.blocked)
      .map(c => ({
        _virtual: true,
        id: `virtual-${c.id}`,
        clientId: c.id,
        teamId: c.teamId,
        userId: null,
        startedAt: c.createdAt, // for sorting purposes
        endedAt: null,
        status: "Non commencé",
        comment: "",
        history: [],
      }));

    let list = [...realList, ...virtualRows];

    // Apply search
    if (search.trim()) {
      const term = normalizeSip(search.trim());
      list = list.filter(i => {
        const c = clients.find(x => x.id === i.clientId);
        return c && (c.sip.includes(term) || c.sip.includes(search.trim()));
      });
    }
    // Apply status filter
    if (statusFilter !== "all") {
      if (statusFilter === "active") list = list.filter(i => i.status !== "Terminé");
      else list = list.filter(i => i.status === statusFilter);
    }
    // Apply month filter — virtual rows fall back to createdAt of client
    if (monthFilter !== "all") {
      list = list.filter(i => {
        const d = new Date(i.startedAt);
        return d.getMonth() === parseInt(monthFilter, 10);
      });
    }

    // Sort: open at top (Non commencé, En cours, Installation OK), then by chosen date order
    const cmpDate = (a, b) => sort === "date_asc"
      ? new Date(a.startedAt) - new Date(b.startedAt)
      : new Date(b.startedAt) - new Date(a.startedAt);
    list.sort((a, b) => {
      const aOpen = OPEN_STATUSES.has(a.status) ? 0 : 1;
      const bOpen = OPEN_STATUSES.has(b.status) ? 0 : 1;
      if (aOpen !== bOpen) return aOpen - bOpen;
      return cmpDate(a, b);
    });
    return list;
  }, [interventions, clients, session, search, statusFilter, monthFilter, sort]);

  const canStart = session.role === "admin" || session.role === "team";

  // Start a new intervention - automatically set status to "En cours"
  const startIntervention = async ({ clientId }) => {
    const now = new Date().toISOString();
    const c = clients.find(x => x.id === clientId);
    // The intervention belongs to the CLIENT's team, regardless of who started it.
    // (Admins can start an intervention for any team — the team must still see it.)
    const teamId = c?.teamId || session.teamId || null;
    const newI = {
      id: uid(),
      clientId,
      teamId,
      userId: session.id,
      startedAt: now,
      endedAt: null,
      status: "En cours",
      comment: "",
      stock: null,
      locked: false,
      legacy: false,
      history: [{ at: now, action: `Démarrée par ${session.name} — statut: En cours` }],
    };
    await saveInterventions([newI, ...interventions]);
    notify("Intervention démarrée — statut En cours", "success");
    setShowStart(false);
  };

  // End / update an intervention
  const endIntervention = async (interventionId, data) => {
    const i = interventions.find(x => x.id === interventionId);
    if (!i) return;
    if (data.status === "Bloqué" && !data.comment.trim()) {
      notify("Un commentaire est requis pour le statut Bloqué", "error");
      return;
    }
    const now = new Date().toISOString();

    // Determine the effective type for this intervention
    const effectiveType = i.type || data.interventionType || null;

    // Stock deduction if Installation OK / Terminé (and not already deducted on a previous save)
    const willDeduct = (data.status === "Installation OK" || data.status === "Terminé") && !i.stockDeducted && data.stock;
    if (willDeduct) {
      const router = data.stock.router || "F6745";
      const cableNeeded = data.stock.cable_m ?? (effectiveType === "Nouveau" ? 25 : 0);
      const fixNeeded = data.stock.fix === "OUI" ? 1 : 0;
      const tId = i.teamId;
      const currentTeamStock = teamStock(stock, tId);
      const updatedTeamStock = { ...currentTeamStock };
      updatedTeamStock[router] = Math.max(0, (updatedTeamStock[router] || 0) - 1);
      updatedTeamStock.cable_m = Math.max(0, (updatedTeamStock.cable_m || 0) - cableNeeded);
      updatedTeamStock.fix_units = Math.max(0, (updatedTeamStock.fix_units || 0) - fixNeeded);
      const nextStock = setTeamStock(stock, tId, updatedTeamStock);
      const movements = [
        ...stockMovements,
        { id: uid(), at: now, interventionId, teamId: tId, type: "OUT", items: { router, cable_m: cableNeeded, fix: fixNeeded } }
      ];
      await saveStock(nextStock);
      await saveStockMovements(movements);
    }

    // Freeze the billed amount using current pricing — if billable status
    let billedAmount = i.billedAmount; // preserve if already frozen
    if ((data.status === "Installation OK" || data.status === "Terminé") && typeof billedAmount !== "number") {
      billedAmount = priceFor(pricing, effectiveType, now);
    }

    const updated = {
      ...i,
      type: effectiveType, // store type on intervention
      endedAt: i.endedAt || now,
      status: data.status,
      comment: data.comment,
      stock: willDeduct ? data.stock : i.stock,
      stockDeducted: willDeduct ? true : (i.stockDeducted || false),
      billedAmount, // frozen price at close time
      locked: data.status === "Terminé",
      lockedAt: data.status === "Terminé" ? now : null,
      history: [...(i.history || []), { at: now, action: `${i.endedAt ? "Mise à jour" : "Clôturée"} par ${session.name} — statut: ${data.status}` }],
    };
    await saveInterventions(interventions.map(x => x.id === interventionId ? updated : x));
    notify("Intervention enregistrée", "success");
    setActive(null);
  };

  // Admin edit of a locked completed intervention (within 24h)
  const adminEdit = async (interventionId, patch) => {
    const i = interventions.find(x => x.id === interventionId);
    if (!i) return;
    if (session.role !== "admin") return notify("Action non autorisée", "error");
    if (i.status === "Terminé" && i.lockedAt) {
      const hoursSince = (Date.now() - new Date(i.lockedAt).getTime()) / 3600000;
      if (hoursSince > 24) return notify("Délai de 24h dépassé pour modifier une intervention terminée", "error");
    }
    const updated = {
      ...i, ...patch,
      history: [...(i.history || []), { at: new Date().toISOString(), action: `Modifiée par admin (${session.name})` }],
    };
    await saveInterventions(interventions.map(x => x.id === interventionId ? updated : x));
    notify("Intervention modifiée", "success");
  };

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between flex-wrap gap-2">
        <div>
          <h1 className="text-2xl font-bold text-slate-900">Interventions</h1>
          <p className="text-sm text-slate-500">{visibleInterventions.length} résultat{visibleInterventions.length > 1 ? "s" : ""}</p>
        </div>
        {canStart && (
          <Btn onClick={() => setShowStart(true)} variant="primary">
            <Play className="w-4 h-4" /> Démarrer
          </Btn>
        )}
      </div>

      <div className="bg-white rounded-xl border border-slate-200 p-3 grid grid-cols-1 sm:grid-cols-4 gap-2">
        <div className="relative sm:col-span-2">
          <Search className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" />
          <input
            value={search}
            onChange={e => setSearch(e.target.value)}
            placeholder="SIP…"
            inputMode="numeric"
            className="w-full pl-9 pr-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
          />
        </div>
        <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)}
          className="px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:bg-white text-sm">
          <option value="all">Tous statuts</option>
          <option value="active">À faire (non terminé)</option>
          {STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
        </select>
        <select value={monthFilter} onChange={e => setMonthFilter(e.target.value)}
          className="px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:bg-white text-sm">
          <option value="all">Tous mois</option>
          {FRENCH_MONTHS.map((m, idx) => <option key={m} value={idx}>{m}</option>)}
        </select>
      </div>

      <div className="space-y-2">
        {visibleInterventions.map(i => {
          const c = clients.find(x => x.id === i.clientId);
          const user = users.find(u => u.id === i.userId);
          const team = teams.find(t => t.id === i.teamId);
          const isOpen = OPEN_STATUSES.has(i.status);
          const isVirtual = i._virtual;
          const canActOnThis = session.role === "admin" || (session.role === "team" && i.teamId === session.teamId);
          return (
            <div
              key={i.id}
              onClick={isVirtual ? undefined : () => setViewing(i)}
              className={`bg-white border rounded-xl p-4 hover:shadow-sm ${isVirtual ? "" : "cursor-pointer"} ${isVirtual ? "border-slate-300 border-dashed bg-slate-50/40" : isOpen ? "border-amber-300 bg-amber-50/30" : "border-slate-200"}`}>
              <div className="flex items-start justify-between gap-3">
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 flex-wrap">
                    <span className="text-xl font-bold font-mono text-slate-900">{c?.sip || "—"}</span>
                    {i.type && <Badge color={i.type === "Nouveau" ? "blue" : "slate"}>{i.type}</Badge>}
                    <span className={`inline-flex items-center px-2 py-0.5 rounded-md text-xs font-semibold border ${STATUS_COLORS[i.status]}`}>{i.status}</span>
                    {i.locked && <Lock className="w-3.5 h-3.5 text-slate-400" />}
                  </div>
                  {c?.name && <div className="text-sm text-slate-600 mt-0.5">{c.name}</div>}
                  <div className="text-xs text-slate-500 mt-2 flex flex-wrap gap-x-3">
                    {isVirtual ? (
                      <span className="italic">Client en attente · créé le {formatDate(c?.createdAt || i.startedAt)}</span>
                    ) : (
                      <>
                        <span>{formatDateTime(i.startedAt)}</span>
                        {i.endedAt && <span>· Durée: <strong className="text-slate-700">{formatDuration(new Date(i.endedAt) - new Date(i.startedAt))}</strong></span>}
                        {user && <span>· {user.name}</span>}
                        {team && session.role !== "team" && <span>· {team.name}</span>}
                      </>
                    )}
                  </div>
                  {!isVirtual && i.comment && <div className="text-xs italic text-slate-500 mt-2 flex items-start gap-1"><MessageSquare className="w-3 h-3 mt-0.5 flex-shrink-0" /> {i.comment}</div>}
                </div>
                <div className="flex flex-col gap-1.5 items-end">
                  {isVirtual && canActOnThis && (
                    <Btn size="sm" variant="success"
                      onClick={(e) => { e.stopPropagation(); startIntervention({ clientId: i.clientId }); }}>
                      <Play className="w-3.5 h-3.5" /> Démarrer
                    </Btn>
                  )}
                  {!isVirtual && isOpen && canActOnThis && (
                    <Btn size="sm" variant={i.status === "En cours" || i.status === "Non commencé" ? "success" : "primary"}
                      onClick={(e) => { e.stopPropagation(); setActive(i); }}>
                      {i.status === "Installation OK" ? <><Edit3 className="w-3.5 h-3.5" /> Mettre à jour</> : <><Square className="w-3.5 h-3.5" /> Clôturer</>}
                    </Btn>
                  )}
                </div>
              </div>
            </div>
          );
        })}
        {visibleInterventions.length === 0 && (
          <div className="text-center py-12 text-slate-500">
            <Wifi className="w-10 h-10 mx-auto mb-2 opacity-30" />
            <p>Aucune intervention</p>
          </div>
        )}
      </div>

      <Modal open={showStart} onClose={() => setShowStart(false)} title="Démarrer une intervention" size="md">
        <StartInterventionForm clients={clients} session={session} teams={teams}
          interventions={interventions}
          onStart={startIntervention} onCancel={() => setShowStart(false)} />
      </Modal>

      <Modal open={!!active} onClose={() => setActive(null)} title={active?.endedAt ? "Mettre à jour l'intervention" : "Clôturer l'intervention"} size="md">
        {active && <EndInterventionForm intervention={active} client={clients.find(c => c.id === active.clientId)}
          onSave={(data) => endIntervention(active.id, data)} onCancel={() => setActive(null)} />}
      </Modal>

      <Modal open={!!viewing} onClose={() => setViewing(null)} title="Détails de l'intervention" size="lg">
        {viewing && <InterventionDetails intervention={viewing} ctx={ctx} onAdminEdit={adminEdit} onClose={() => setViewing(null)} />}
      </Modal>
    </div>
  );
}

function StartInterventionForm({ clients, session, teams, interventions, onStart, onCancel }) {
  const [search, setSearch] = useState("");
  const [selected, setSelected] = useState(null);
  const [showNewClient, setShowNewClient] = useState(false);

  // Clients available to start a NEW intervention with.
  // Rule: a client is available if they have NO currently-open intervention
  // (Non commencé / En cours / Installation OK). Clients whose last visit was
  // Terminé or Bloqué can be re-started for a new visit.
  const available = useMemo(() => {
    let list = clients;
    if (session.role === "team") list = list.filter(c => c.teamId === session.teamId);
    // Exclude blocked clients
    list = list.filter(c => !c.blocked);
    if (search.trim()) {
      const term = normalizeSip(search.trim());
      list = list.filter(c => c.sip.includes(term) || c.sip.includes(search.trim()));
    }
    const openClientIds = new Set();
    for (const i of interventions) {
      if (OPEN_STATUSES.has(i.status)) openClientIds.add(i.clientId);
    }
    list = list.filter(c => !openClientIds.has(c.id));
    return list.slice(0, 30);
  }, [clients, search, session, interventions]);

  if (showNewClient) {
    return <InlineClientCreate
      onCreated={(client) => { setSelected(client); setShowNewClient(false); }}
      onCancel={() => setShowNewClient(false)}
      session={session} teams={teams}
    />;
  }

  return (
    <div className="space-y-4">
      <div>
        <span className="block text-xs font-semibold text-slate-600 mb-1 uppercase tracking-wide">Client *</span>
        <div className="relative">
          <Search className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" />
          <input
            value={search} onChange={e => { setSearch(e.target.value); setSelected(null); }}
            placeholder="Rechercher par SIP…" inputMode="numeric" autoFocus
            className="w-full pl-9 pr-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>
        {!selected && search && (
          <div className="mt-2 max-h-56 overflow-y-auto border border-slate-200 rounded-lg divide-y">
            {available.map(c => (
              <button key={c.id} onClick={() => { setSelected(c); setSearch(c.sip); }}
                className="w-full text-left px-3 py-2 hover:bg-blue-50">
                <div className="font-mono font-bold">{c.sip}</div>
                {c.name && <div className="text-xs text-slate-500">{c.name}</div>}
              </button>
            ))}
            {available.length === 0 && <div className="px-3 py-3 text-sm text-slate-500">Aucun client. <button onClick={() => setShowNewClient(true)} className="text-blue-600 font-semibold">Créer ?</button></div>}
          </div>
        )}
      </div>

      {selected && (
        <div className="bg-blue-50 border border-blue-200 rounded-lg p-3">
          <div className="font-mono font-bold text-lg text-slate-900">{selected.sip}</div>
          {selected.name && <div className="text-sm text-slate-700">{selected.name}</div>}
        </div>
      )}

      <button onClick={() => setShowNewClient(true)} className="text-sm text-blue-700 font-semibold hover:underline">+ Nouveau client</button>

      <div className="flex gap-2 pt-2">
        <Btn variant="secondary" onClick={onCancel} className="flex-1">Annuler</Btn>
        <Btn variant="success" disabled={!selected} onClick={() => onStart({ clientId: selected.id })} className="flex-1">
          <Play className="w-4 h-4" /> Démarrer
        </Btn>
      </div>
    </div>
  );
}

function InlineClientCreate({ onCreated, onCancel, session, teams }) {
  const { saveClients, clients, notify } = useCtxInline();
  const [sip, setSip] = useState("");
  const [name, setName] = useState("");

  const submit = async (e) => {
    e.preventDefault();
    if (!isValidSip(sip)) return notify("SIP invalide. Il doit commencer par 05.", "error");
    const normalized = normalizeSip(sip);
    if (clients.some(c => c.sip === normalized)) return notify("SIP déjà existant", "error");
    const c = {
      id: uid(), sip: normalized, name: name.trim(), type: null,
      createdAt: new Date().toISOString(), createdByUserId: session.id,
      teamId: session.teamId || (teams[0]?.id ?? null), legacy: false,
    };
    await saveClients([c, ...clients]);
    notify("Client créé", "success");
    onCreated(c);
  };

  return (
    <form onSubmit={submit} className="space-y-3">
      <h3 className="font-semibold text-slate-700">Nouveau client</h3>
      <Input label="SIP" value={sip} onChange={setSip} inputMode="numeric" placeholder="0530000000" required autoFocus />
      <Input label="Nom (optionnel)" value={name} onChange={setName} />
      <p className="text-xs text-slate-500">Le type (Nouveau / Existant) sera demandé à la fin de l'intervention.</p>
      <div className="flex gap-2">
        <Btn type="button" variant="secondary" onClick={onCancel} className="flex-1">Retour</Btn>
        <Btn type="submit" variant="primary" className="flex-1">Créer</Btn>
      </div>
    </form>
  );
}

// Context hack so InlineClientCreate can reach storage actions
let _inlineCtxRef = null;
function useCtxInline() { return _inlineCtxRef; }

function EndInterventionForm({ intervention, client, onSave, onCancel }) {
  // Status options shown to user. "En cours" is set automatically on start, not chosen here.
  // "Non commencé" is the initial state; closing an intervention requires picking a real outcome.
  const STATUS_CHOICES = END_STATUSES;

  // Type may live on the intervention (newer model) or the client (legacy). Prefer intervention.
  const existingType = intervention.type || client?.type || null;

  const [status, setStatus] = useState(
    intervention.status && STATUS_CHOICES.includes(intervention.status) ? intervention.status : "Installation OK"
  );
  const [comment, setComment] = useState(intervention.comment || "");
  const [interventionType, setInterventionType] = useState(existingType || "Nouveau");
  const [router, setRouter] = useState(intervention.stock?.router || "F6745");
  const [fix, setFix] = useState(intervention.stock?.fix || "NON");
  // Cable default by type: Nouveau → 25m, all others → 0m by default
  const defaultCableFor = (t) => (t === "Nouveau" ? 25 : 0);
  const [cable, setCable] = useState(
    intervention.stock?.cable_m ?? defaultCableFor(existingType || interventionType)
  );

  // If stock was already deducted previously (e.g. saved earlier as Installation OK), skip the stock form
  const stockAlreadyDeducted = !!intervention.stockDeducted;
  const closingStatus = status === "Installation OK" || status === "Terminé";
  const showStock = closingStatus && !stockAlreadyDeducted;
  // Only ask for type if it isn't already set AND we're closing the intervention
  const showTypeSelector = closingStatus && !existingType;
  const commentRequired = status === "Bloqué";

  // Sync cable default when type changes
  useEffect(() => {
    if (showStock && intervention.stock?.cable_m === undefined) {
      setCable(defaultCableFor(interventionType));
    }
  }, [interventionType]); // eslint-disable-line

  const submit = (e) => {
    e.preventDefault();
    onSave({
      status,
      comment,
      stock: showStock ? { router, fix, cable_m: Number(cable) } : null,
      interventionType: showTypeSelector ? interventionType : null,
    });
  };

  // Color helper for type badge
  const typeColor = (t) => t === "Nouveau" ? "blue" : t === "SAV" ? "amber" : t === "Partage" ? "rose" : "slate";

  return (
    <form onSubmit={submit} className="space-y-4">
      {client && (
        <div className="bg-slate-50 rounded-lg p-3 border border-slate-200">
          <div className="font-mono font-bold text-lg">{client.sip}</div>
          {client.name && <div className="text-sm text-slate-600">{client.name}</div>}
          <div className="text-xs mt-1">Démarrée à {formatDateTime(intervention.startedAt)}</div>
          {existingType && <div className="text-xs mt-1"><Badge color={typeColor(existingType)}>{existingType}</Badge></div>}
        </div>
      )}

      <Select label="Statut" value={status} onChange={setStatus} options={STATUS_CHOICES} required />

      {showTypeSelector && (
        <div className="bg-blue-50 border border-blue-200 rounded-xl p-4 space-y-2">
          <div className="text-sm font-semibold text-blue-900">Type d'intervention</div>
          <Select label="Type" value={interventionType} onChange={setInterventionType} options={INTERVENTION_TYPES} required />
          <p className="text-xs text-blue-700">Cette information détermine le tarif appliqué.</p>
        </div>
      )}

      {showStock && (
        <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-4 space-y-3">
          <div className="flex items-center gap-2 text-emerald-800 font-semibold text-sm">
            <Boxes className="w-4 h-4" /> Stock utilisé
          </div>
          <Select label="Routeur" value={router} onChange={setRouter} options={ROUTERS} />
          <Select label="FIX" value={fix} onChange={setFix} options={["NON", "OUI"]} />
          <Input label="Câble intérieur (mètres)" type="number" value={cable} onChange={setCable} inputMode="numeric" />
          <p className="text-xs text-emerald-700">Le stock sera automatiquement déduit.</p>
        </div>
      )}

      {stockAlreadyDeducted && (status === "Installation OK" || status === "Terminé") && (
        <div className="bg-slate-50 border border-slate-200 rounded-lg p-3 text-xs text-slate-600 flex items-start gap-2">
          <CheckCircle2 className="w-4 h-4 flex-shrink-0 mt-0.5 text-emerald-600" />

function InterventionDetails({ intervention, ctx, onAdminEdit, onClose }) {
  const { session, clients, users, teams } = ctx;
  const c = clients.find(x => x.id === intervention.clientId);
  const user = users.find(u => u.id === intervention.userId);
  const team = teams.find(t => t.id === intervention.teamId);

  const [newComment, setNewComment] = useState("");
  const [editing, setEditing] = useState(false);

  const canAdminEdit = session.role === "admin" && intervention.status === "Terminé" && intervention.lockedAt &&
    (Date.now() - new Date(intervention.lockedAt).getTime()) / 3600000 < 24;

  const addComment = async () => {
    if (!newComment.trim()) return;
    const updated = {
      ...intervention,
      history: [...(intervention.history || []), { at: new Date().toISOString(), action: `Commentaire (${session.name}): ${newComment}` }],
    };
    await ctx.saveInterventions(ctx.interventions.map(x => x.id === intervention.id ? updated : x));
    ctx.notify("Commentaire ajouté", "success");
    setNewComment(""); setAdding(false);
    // Update local view immediately
    intervention.history = updated.history; // ok since modal is short-lived and will re-render with fresh ctx on next open
  };

  return (
    <div className="space-y-4">
      <div className="bg-slate-50 rounded-lg p-3 border border-slate-200">
        <div className="flex items-center gap-2 flex-wrap">
          <span className="font-mono font-bold text-2xl">{c?.sip || "—"}</span>
          {intervention.type && <Badge color={intervention.type === "Nouveau" ? "blue" : "slate"}>{intervention.type}</Badge>}
          <span className={`inline-flex items-center px-2 py-0.5 rounded-md text-xs font-semibold border ${STATUS_COLORS[intervention.status]}`}>{intervention.status}</span>
          {intervention.locked && <Badge color="slate"><Lock className="w-3 h-3" /> Verrouillée</Badge>}
        </div>
        {c?.name && <div className="text-sm text-slate-700 mt-1">{c.name}</div>}
      </div>

      <div className="grid grid-cols-2 gap-3 text-sm">
        <Detail label="Démarrée" value={formatDateTime(intervention.startedAt)} />
        <Detail label="Clôturée" value={intervention.endedAt ? formatDateTime(intervention.endedAt) : "—"} />
        <Detail label="Durée" value={intervention.endedAt ? formatDuration(new Date(intervention.endedAt) - new Date(intervention.startedAt)) : "En cours"} />
        <Detail label="Technicien" value={user?.name || "—"} />
        {session.role !== "team" && <Detail label="Équipe" value={team?.name || "—"} />}
      </div>

            <div><span className="text-slate-500">FIX:</span> <strong>{intervention.stock.fix}</strong></div>

        </div>

      {intervention.comment && (
        <div>
          <div className="text-xs font-semibold text-slate-600 uppercase mb-1">Commentaire</div>
          <div className="bg-amber-50 border border-amber-200 rounded-lg p-3 text-sm italic">{intervention.comment}</div>
        </div>
      )}

      <div>
        <div className="flex items-center justify-between mb-2">
          <div className="text-xs font-semibold text-slate-600 uppercase">Historique</div>
          {(session.role === "admin" || session.role === "team") && (
            <button onClick={() => setAdding(a => !a)} className="text-xs font-semibold text-blue-700">+ Commentaire</button>
          )}

        {adding && (
          <div className="mb-2 space-y-2">

              className="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm" />
            <div className="flex gap-2">
